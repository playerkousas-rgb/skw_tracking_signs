<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKW 追蹤系統 - 領袖實戰版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-blur { backdrop-filter: blur(8px); }
        @keyframes flash { 0% { background: rgba(245,158,11,0.5); } 100% { background: transparent; } }
        .flash-effect { animation: flash 0.2s ease-out; }
        .sign-card { transition: all 0.1s ease; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .sign-card:active { transform: scale(0.9); background: #444; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .radar-glow { box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); }
    </style>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen font-sans select-none overflow-x-hidden">

    <div id="setup" class="p-10 text-center flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-5xl font-black text-amber-500 mb-2 tracking-tighter italic">SKW TRACKING</h1>
        <p class="text-stone-500 mb-12 uppercase tracking-[0.3em] text-[10px] font-bold">追蹤符號定位系統</p>
        <div class="max-w-xs w-full space-y-4">
            <input id="mi" type="text" placeholder="輸入頻道 ID" class="w-full bg-stone-800 p-5 rounded-2xl border border-stone-700 text-center uppercase font-black text-2xl outline-none focus:border-amber-500 transition-all shadow-inner">
            <button onclick="window.joinMission()" class="w-full bg-amber-600 hover:bg-amber-500 py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">開啟儀器</button>
        </div>
    </div>

    <div id="app" class="hidden p-4 max-w-md mx-auto pb-32">
        <div class="flex justify-between items-center mb-4 bg-stone-800/90 p-4 rounded-3xl border border-stone-700 backdrop-blur-xl sticky top-4 z-40 shadow-2xl">
            <div>
                <span id="accuracyDisp" class="text-[9px] text-stone-500 block uppercase font-bold tracking-widest">定位搜尋中...</span>
                <h2 id="cid" class="text-xl font-black text-amber-500 tracking-widest uppercase italic">---</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="window.openAuthModal()" class="w-12 h-12 flex items-center justify-center bg-stone-700 rounded-2xl border border-stone-600 shadow-lg text-lg">🛠️</button>
                <button onclick="window.exitMission()" class="w-12 h-12 flex items-center justify-center bg-stone-700 rounded-2xl text-stone-400 border border-stone-600">✕</button>
            </div>
        </div>

        <div class="bg-stone-800 rounded-[2rem] p-5 mb-4 text-center border border-stone-700 shadow-xl relative overflow-hidden">
            <div id="prog" class="absolute top-4 right-6 text-[10px] text-amber-500 font-mono font-bold bg-black/40 px-3 py-1 rounded-full">0/0</div>
            <div id="statusMsg" class="text-lg mb-1 italic h-10 flex items-center justify-center font-bold text-stone-300">請啟動定位儀</div>
            <div id="debugDist" class="text-[10px] text-stone-500 font-mono tracking-widest uppercase">WAITING GPS...</div>
        </div>

        <div class="aspect-square bg-stone-950 rounded-[3rem] border-8 border-stone-800 shadow-2xl flex items-center justify-center relative overflow-hidden radar-glow">
            <canvas id="mainCanvas" width="600" height="600" class="w-full h-full p-12 z-10"></canvas>
            <button onclick="window.nextStep()" class="absolute bottom-6 right-6 bg-amber-500 text-black px-6 py-3 rounded-full font-black text-xs shadow-2xl active:scale-90 transition-all uppercase border-b-4 border-amber-700">下一站 ➔</button>
        </div>

        <button id="gpsBtn" onclick="window.watchGPS()" class="w-full bg-blue-600 py-6 rounded-3xl font-black mt-6 shadow-xl active:scale-95 transition-all tracking-[0.4em] text-sm border-b-4 border-blue-800">📡 啟動定位監控</button>

        <div id="leader" class="mt-8 space-y-6 hidden animate-slide-up pb-20">
            <div class="h-px bg-stone-700 w-full"></div>
            <div class="flex justify-between items-center">
                <h3 class="text-amber-500 font-black uppercase tracking-[0.2em] text-sm">領袖投放工具</h3>
                <button id="lockToggle" onclick="window.toggleLock()" class="text-[10px] bg-stone-800 px-4 py-2 rounded-full border border-stone-600 font-bold">🔒 鎖定路徑</button>
            </div>

            <div id="editorControls" class="grid grid-cols-3 gap-2">
                <button onclick="window.dropPoint('go')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⬆️走</button>
                <button onclick="window.dropPoint('left')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⬅️左</button>
                <button onclick="window.dropPoint('right')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">➡️右</button>
                <button onclick="window.dropPoint('wrong')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold text-red-400">❌錯</button>
                <button onclick="window.dropPoint('danger')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold text-orange-400">⚠️危</button>
                <button onclick="window.dropPoint('split')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">🔱分</button>
                <button onclick="window.dropPoint('wait')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⏸等</button>
                <button onclick="window.dropPoint('home')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">🏠家</button>
                <button onclick="window.dropPoint('block')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⛰️障</button>
                <button onclick="window.openStepModal()" class="sign-card bg-amber-900/20 border border-amber-600/30 p-4 rounded-2xl text-[10px] font-bold col-span-3">👣 投放信物步數</button>
            </div>

            <div class="bg-stone-800/50 rounded-3xl p-5 border border-stone-700">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="text-stone-500 font-bold text-[10px] uppercase">已投放點位</h4>
                    <button onclick="window.clearCurrentPoints()" class="text-red-500 text-[10px] font-black border border-red-900/30 px-3 py-1 rounded-full">🚨 清空</button>
                </div>
                <div id="pointList" class="space-y-2 max-h-48 overflow-y-auto pr-2 text-xs"></div>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/80 modal-blur" onclick="window.closeAuthModal()"></div>
        <div class="bg-stone-800 w-full max-w-xs p-8 rounded-[3rem] border border-stone-700 relative text-center">
            <h3 class="text-xl font-black mb-6 text-amber-500">領袖驗證</h3>
            <input id="authPass" type="password" placeholder="PASSWORD" class="w-full bg-stone-900 p-4 rounded-2xl mb-4 border border-stone-700 text-center outline-none text-2xl font-bold tracking-widest">
            <button onclick="window.verifyLeader()" class="w-full bg-amber-600 py-4 rounded-2xl font-bold">驗證登入</button>
        </div>
    </div>

    <div id="stepModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/80 modal-blur" onclick="window.closeStepModal()"></div>
        <div class="bg-stone-800 w-full max-w-xs p-8 rounded-[3rem] border border-stone-700 relative text-center">
            <h3 class="text-xl font-black mb-2 text-amber-500 italic">信物步數</h3>
            <input id="stepCount" type="number" value="20" class="w-full bg-stone-900 p-4 rounded-2xl mb-6 border border-stone-700 text-center text-4xl font-black outline-none">
            <button onclick="window.submitSteps()" class="w-full bg-amber-600 py-4 rounded-2xl font-bold">確認</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'skw_tracker_v3_integrated';
        const s=(c,x1,y1,x2,y2)=>{c.lineCap='round';c.lineWidth=26;c.strokeStyle='#78350f';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.lineWidth=18;c.strokeStyle='#f59e0b';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();};
        const SIGNS={'go':(c)=>{s(c,300,520,300,80);s(c,300,80,220,180);s(c,300,80,380,180);},'left':(c)=>{s(c,520,300,80,300);s(c,80,300,180,220);s(c,80,300,180,380);},'right':(c)=>{s(c,80,300,520,300);s(c,520,300,420,220);s(c,520,300,420,380);},'wrong':(c)=>{s(c,150,150,450,450);s(c,450,150,150,450);},'danger':(c)=>{const st=(x,y,r)=>{c.fillStyle='#57534e';c.beginPath();for(let i=0;i<6;i++){let a=i*Math.PI/3;let dr=r*(0.8+Math.random()*0.4);c.lineTo(x+Math.cos(a)*dr,y+Math.sin(a)*dr);}c.closePath();c.fill();};st(300,200,60);st(220,380,60);st(380,380,60);},'split':(c)=>{s(c,300,520,300,300);s(c,300,300,150,150);s(c,300,300,450,150);},'wait':(c)=>{s(c,150,200,450,200);s(c,150,300,450,300);s(c,150,400,450,400);},'home':(c)=>{c.lineWidth=20;c.strokeStyle='#f59e0b';c.beginPath();c.arc(300,300,180,0,Math.PI*2);c.stroke();c.fillStyle='#f59e0b';c.beginPath();c.arc(300,300,30,0,Math.PI*2);c.fill();},'block':(c)=>{s(c,100,450,300,150);s(c,300,150,500,450);},'steps':(c,v)=>{c.lineWidth=15;c.strokeStyle='#f59e0b';c.beginPath();c.arc(300,300,150,0,Math.PI*2);c.stroke();c.fillStyle='#f59e0b';c.font="900 120px sans-serif";c.textAlign="center";c.fillText(v||"0",300,345);s(c,300,140,300,40);}};

        let missionId="", points=[], isLocked=false, userPos=null, currentAccuracy=0;
        let allMissions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

        window.joinMission = () => {
            missionId = document.getElementById('mi').value.toUpperCase().trim();
            if(!missionId) return;
            localStorage.setItem('last_id', missionId);
            const data = allMissions[missionId] || {points:[], isLocked:false};
            points=data.points; isLocked=data.isLocked;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('cid').innerText = missionId;
            updateUIState(); refresh();
        };

        window.watchGPS = () => {
            navigator.geolocation.watchPosition(p => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                currentAccuracy = p.coords.accuracy;
                const accDisp = document.getElementById('accuracyDisp');
                accDisp.innerText = `精準度: ±${currentAccuracy.toFixed(1)}M`;
                accDisp.style.color = currentAccuracy < 10 ? '#39ff14' : (currentAccuracy > 20 ? '#ff4444' : '#f59e0b');
                refresh();
            }, null, { enableHighAccuracy: true, maximumAge: 0 });
            document.getElementById('gpsBtn').innerText = "📡 定位監控中";
            document.getElementById('gpsBtn').classList.replace('bg-blue-600', 'bg-green-700');
        };

        window.dropPoint = (t, v=null) => {
            if(isLocked) return alert("路徑已鎖定");
            if(!userPos) return alert("等待 GPS 訊號...");
            
            // 投放提示感
            if(navigator.vibrate) navigator.vibrate(80);
            document.getElementById('app').classList.add('flash-effect');
            setTimeout(()=>document.getElementById('app').classList.remove('flash-effect'), 200);

            points.push({lat:userPos.lat, lng:userPos.lng, type:t, val:v, acc:currentAccuracy});
            window.saveLocal();
        };

        window.saveLocal = () => {
            allMissions[missionId] = {points, isLocked};
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allMissions));
            updateUIState();
        };

        function refresh() {
            const pIdx = parseInt(localStorage.getItem(`p_${missionId}`)||"0");
            document.getElementById('prog').innerText = `${pIdx}/${points.length}`;
            if(!userPos || points.length===0) { ctx.clearRect(0,0,600,600); return; }
            const t = points[pIdx];
            if(!t) { document.getElementById('statusMsg').innerText="🏁 抵達終點"; ctx.clearRect(0,0,600,600); return; }
            
            const dist = getD(userPos.lat, userPos.lng, t.lat, t.lng);
            document.getElementById('debugDist').innerText = `距離目標: ${Math.round(dist)}M`;
            
            ctx.clearRect(0,0,600,600);
            if(dist <= 12) { // 觸發範圍設定為 12 公尺
                if(SIGNS[t.type]) SIGNS[t.type](ctx, t.val); 
                document.getElementById('statusMsg').innerText="📍 發現追蹤符號";
                document.getElementById('statusMsg').classList.add('text-amber-500');
            } else { 
                document.getElementById('statusMsg').innerText="🔍 搜尋符號中..."; 
                document.getElementById('statusMsg').classList.remove('text-amber-500');
            }
        }

        function getD(la1,lo1,la2,lo2){
            const R=6371e3,f1=la1*Math.PI/180,f2=la2*Math.PI/180,df=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;
            const a=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
            return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        }

        window.updateUIState = () => {
            document.getElementById('pointList').innerHTML = points.map((p,i)=>`
                <div class="flex justify-between items-center p-3 bg-stone-900 mb-2 rounded-xl border border-stone-700/50">
                    <span class="font-mono text-amber-500">${i+1}. ${p.type.toUpperCase()} <small class="text-stone-600">(±${p.acc ? p.acc.toFixed(0) : '?'})</small></span>
                    <button onclick="points.splice(${i},1);window.saveLocal();" class="text-red-500 px-2 font-bold text-lg">✕</button>
                </div>`).join('');
        };

        window.verifyLeader = () => {
            const p = document.getElementById('authPass').value;
            if(p==="0728" || p==="1201") {
                document.getElementById('leader').classList.remove('hidden');
                window.closeAuthModal();
            } else alert("密碼錯誤");
        };

        window.nextStep = () => { const p = parseInt(localStorage.getItem(`p_${missionId}`)||"0"); if(p<points.length){ localStorage.setItem(`p_${missionId}`, p+1); refresh(); } };
        window.toggleLock = () => { isLocked=!isLocked; document.getElementById('lockToggle').innerText = isLocked ? "🔓 解除鎖定" : "🔒 鎖定路徑"; window.saveLocal(); };
        window.exitMission = () => { if(confirm("確定退出儀器？")) location.reload(); };
        window.clearCurrentPoints = () => { if(confirm("確定清空此頻道所有符號？")) { points=[]; window.saveLocal(); refresh(); } };
        window.openAuthModal = () => document.getElementById('authModal').classList.remove('hidden');
        window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');
        window.openStepModal = () => document.getElementById('stepModal').classList.remove('hidden');
        window.closeStepModal = () => document.getElementById('stepModal').classList.add('hidden');
        window.submitSteps = () => { window.dropPoint('steps', document.getElementById('stepCount').value); window.closeStepModal(); };
        window.onload = () => { if(localStorage.getItem('last_id')) document.getElementById('mi').value = localStorage.getItem('last_id'); };
    </script>
</body>
</html>
