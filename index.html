<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKW 追蹤系統 - 領袖終極版 v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .modal-blur { backdrop-filter: blur(12px); }
        @keyframes flash { 0% { background: rgba(245,158,11,0.5); } 100% { background: transparent; } }
        .flash-effect { animation: flash 0.2s ease-out; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; }
        #qrcode img { margin: auto; border: 12px solid white; border-radius: 12px; }
        .sign-btn:active { transform: scale(0.9); background-color: #444; }
    </style>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen font-sans overflow-x-hidden" oncontextmenu="return false;">

    <div id="setup" class="p-10 text-center flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-5xl font-black text-amber-500 mb-2 tracking-tighter italic">SKW TRACKING</h1>
        <p class="text-stone-500 mb-12 uppercase tracking-[0.3em] text-[10px] font-bold">SYSTEM V4.0 (增量/分段/全符號)</p>
        <div class="max-w-xs w-full space-y-4">
            <input id="mi" type="text" placeholder="頻道 ID" class="w-full bg-stone-800 p-5 rounded-2xl border border-stone-700 text-center uppercase font-black text-2xl focus:border-amber-500 transition-all text-amber-500 shadow-inner">
            <button onclick="window.joinMission()" class="w-full bg-amber-600 py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">開啟儀器</button>
            <button onclick="window.openImportModal()" class="w-full text-stone-500 text-xs py-2 underline decoration-stone-700">📥 導入/追加 領袖情報</button>
        </div>
        <footer class="absolute bottom-8 w-full text-[9px] text-stone-600 font-bold tracking-widest uppercase">
            © 2024-2026 SKW SCOUT GROUP. ALL RIGHTS RESERVED.
        </footer>
    </div>

    <div id="app" class="hidden p-4 max-w-md mx-auto pb-32">
        <div class="flex justify-between items-center mb-4 bg-stone-800/90 p-4 rounded-3xl border border-stone-700 backdrop-blur-xl sticky top-4 z-40 shadow-2xl">
            <div>
                <span id="accuracyDisp" class="text-[9px] text-stone-500 block uppercase font-bold tracking-widest tracking-tighter italic">GPS WAITING</span>
                <h2 id="cid" class="text-xl font-black text-amber-500 tracking-widest uppercase italic">---</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="window.openAuthModal()" class="w-12 h-12 flex items-center justify-center bg-stone-700 rounded-2xl border border-stone-600 shadow-lg text-lg">🛠️</button>
                <button onclick="window.exitMission()" class="w-12 h-12 flex items-center justify-center bg-stone-700 rounded-2xl text-stone-400 border border-stone-600 shadow-lg font-bold italic">✕</button>
            </div>
        </div>

        <div class="bg-stone-800 rounded-[2rem] p-5 mb-4 text-center border border-stone-700 shadow-xl relative">
            <div id="prog" class="absolute top-4 right-6 text-[10px] text-amber-500 font-mono font-bold bg-black/40 px-3 py-1 rounded-full italic">0/0</div>
            <div id="statusMsg" class="text-lg mb-1 italic h-10 flex items-center justify-center font-bold text-stone-300">啟動定位監控</div>
            <div id="debugDist" class="text-[10px] text-stone-500 font-mono tracking-widest uppercase italic">SEARCHING GPS...</div>
        </div>

        <div class="aspect-square bg-stone-950 rounded-[3rem] border-8 border-stone-800 shadow-2xl flex items-center justify-center relative overflow-hidden">
            <canvas id="mainCanvas" width="600" height="600" class="w-full h-full p-12 z-10"></canvas>
            <button onclick="window.nextStep()" class="absolute bottom-6 right-6 bg-amber-500 text-black px-6 py-3 rounded-full font-black text-xs shadow-2xl active:scale-90 transition-all border-b-4 border-amber-700 italic">NEXT ➔</button>
        </div>

        <button id="gpsBtn" onclick="window.watchGPS()" class="w-full bg-blue-600 py-6 rounded-3xl font-black mt-6 shadow-xl active:scale-95 transition-all tracking-[0.4em] text-sm border-b-4 border-blue-800">📡 啟動追蹤儀器</button>

        <div id="leader" class="mt-8 space-y-6 hidden pb-20">
            <div class="h-px bg-stone-700 w-full"></div>
            <div class="flex justify-between items-center px-2 font-black uppercase text-xs tracking-widest">
                <h3 class="text-amber-500 italic">Leader Panel</h3>
                <button onclick="window.toggleLock()" id="lockToggle" class="bg-stone-800 px-4 py-2 rounded-full border border-stone-600 italic">🔒 鎖定</button>
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <button onclick="window.dropPoint('go')" class="sign-btn bg-stone-800 p-4 rounded-2xl text-[10px] font-bold">⬆️ 走</button>
                <button onclick="window.dropPoint('left')" class="sign-btn bg-stone-800 p-4 rounded-2xl text-[10px] font-bold">⬅️ 左</button>
                <button onclick="window.dropPoint('right')" class="sign-btn bg-stone-800 p-4 rounded-2xl text-[10px] font-bold">➡️ 右</button>
                <button onclick="window.dropPoint('wrong')" class="sign-btn bg-stone-800 p-4 rounded-2xl text-[10px] font-bold text-red-500">❌ 錯</button>
                <button onclick="window.dropPoint('danger')" class="sign-btn bg-stone-800 p-4 rounded-2xl text-[10px] font-bold text-orange-400">⚠️ 危</button>
                <button onclick="window.dropPoint('split')" class="sign-btn bg-stone-800 p-4 rounded-2xl text-[10px] font-bold">🔱 分</button>
                <button onclick="window.dropPoint('home')" class="sign-btn bg-stone-800 p-4 rounded-2xl text-[10px] font-bold text-amber-500 border border-amber-900/30">🏠 家</button>
                <button onclick="window.dropPoint('block')" class="sign-btn bg-stone-800 p-4 rounded-2xl text-[10px] font-bold">⛰️ 障</button>
                <button onclick="window.openStepModal()" class="sign-btn bg-amber-900/30 p-4 rounded-2xl text-[10px] font-bold border border-amber-600/30 text-amber-400 italic">👣 步數</button>
            </div>

            <div class="bg-stone-800 p-5 rounded-[2rem] border border-stone-700">
                <p class="text-[10px] font-bold uppercase text-stone-500 mb-3 px-1 italic">Data Sharing</p>
                <div class="flex gap-2">
                    <button onclick="window.exportQR()" class="flex-1 bg-green-700 py-4 rounded-2xl text-xs font-black shadow-lg">📤 分段 QR</button>
                    <button onclick="window.exportJSON()" class="flex-1 bg-stone-700 py-4 rounded-2xl text-xs font-black text-stone-400">📄 複製代碼</button>
                </div>
            </div>
            <button onclick="window.clearCurrentPoints()" class="w-full text-red-900 text-[10px] font-bold uppercase tracking-widest">🚨 清除所有數據</button>
        </div>
    </div>

    <div id="stepModal" class="fixed inset-0 z-[200] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/90 modal-blur" onclick="window.closeStepModal()"></div>
        <div class="bg-stone-800 p-8 rounded-[3rem] border border-stone-700 relative text-center w-full max-w-xs">
            <h3 class="text-xl font-black mb-1 text-amber-500 italic uppercase">信物位置</h3>
            <p class="text-[10px] text-stone-500 mb-6 uppercase">輸入多少步後發現信物</p>
            <input id="stepCount" type="number" value="20" class="w-full bg-stone-950 p-6 rounded-2xl mb-6 border border-stone-700 text-center text-6xl font-black outline-none text-amber-500">
            <button onclick="window.submitSteps()" class="w-full bg-amber-600 py-4 rounded-2xl font-black shadow-xl uppercase">確認投放</button>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 z-[200] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/95 modal-blur" onclick="window.closeQRModal()"></div>
        <div class="bg-white p-8 rounded-[3rem] relative text-center w-full max-w-xs">
            <h3 id="qrTitle" class="text-stone-900 font-black mb-4 uppercase italic">Path Data</h3>
            <div id="qrcode" class="mb-4 flex justify-center"></div>
            <p id="qrWarning" class="text-red-500 text-[9px] mb-6 font-bold hidden">數據量過大！</p>
            <button onclick="window.closeQRModal()" class="text-stone-900 font-black underline italic">CLOSE</button>
        </div>
    </div>

    <div id="importModal" class="fixed inset-0 z-[200] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/80 modal-blur" onclick="window.closeImportModal()"></div>
        <div class="bg-stone-800 p-8 rounded-[3rem] border border-stone-700 relative text-center w-full max-w-xs shadow-2xl">
            <h3 class="text-amber-500 font-black mb-2 italic">導入 / 追加數據</h3>
            <textarea id="importText" placeholder="貼上 JSON..." class="w-full bg-stone-950 border border-stone-700 rounded-2xl p-4 text-[10px] text-stone-400 h-32 mb-4 font-mono outline-none"></textarea>
            <button onclick="window.processImport()" class="w-full bg-amber-600 py-4 rounded-2xl font-black shadow-xl">確認併入</button>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/80 modal-blur" onclick="window.closeAuthModal()"></div>
        <div class="bg-stone-800 w-full max-w-xs p-8 rounded-[3rem] border border-stone-700 relative text-center">
            <h3 class="text-xl font-black mb-6 text-amber-500 uppercase italic">Leader Access</h3>
            <input id="authPass" type="password" placeholder="PASSWORD" class="w-full bg-stone-950 p-4 rounded-2xl mb-4 border border-stone-700 text-center outline-none text-2xl font-bold tracking-widest text-amber-500">
            <button onclick="window.verifyLeader()" class="w-full bg-amber-600 py-4 rounded-2xl font-black uppercase">LOGIN</button>
        </div>
    </div>

    <script>
        // --- 🔒 安全機制 ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && [85, 83, 73, 83].includes(e.keyCode))) return false; };

        // --- 核心變數 ---
        const STORAGE_KEY = 'skw_v4_final_merge';
        let missionId="", points=[], isLocked=false, userPos=null, currentAccuracy=0;
        let allMissions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

        // --- 🎨 符號繪圖引擎 (包含步數繪製) ---
        const s=(c,x1,y1,x2,y2)=>{c.lineCap='round';c.lineWidth=26;c.strokeStyle='#78350f';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.lineWidth=18;c.strokeStyle='#f59e0b';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();};
        const SIGNS={
            'go':(c)=>{s(c,300,520,300,80);s(c,300,80,220,180);s(c,300,80,380,180);},
            'left':(c)=>{s(c,520,300,80,300);s(c,80,300,180,220);s(c,80,300,180,380);},
            'right':(c)=>{s(c,80,300,520,300);s(c,520,300,420,220);s(c,520,300,420,380);},
            'wrong':(c)=>{s(c,150,150,450,450);s(c,450,150,150,450);},
            'danger':(c)=>{const st=(x,y,r)=>{c.fillStyle='#57534e';c.beginPath();for(let i=0;i<6;i++){let a=i*Math.PI/3;let dr=r*(0.8+Math.random()*0.4);c.lineTo(x+Math.cos(a)*dr,y+Math.sin(a)*dr);}c.closePath();c.fill();};st(300,200,60);st(220,380,60);st(380,380,60);},
            'split':(c)=>{s(c,300,520,300,300);s(c,300,300,150,150);s(c,300,300,450,150);},
            'home':(c)=>{c.lineWidth=20;c.strokeStyle='#f59e0b';c.beginPath();c.arc(300,300,180,0,Math.PI*2);c.stroke();c.fillStyle='#f59e0b';c.beginPath();c.arc(300,300,30,0,Math.PI*2);c.fill();},
            'block':(c)=>{s(c,100,450,300,150);s(c,300,150,500,450);},
            // 特別符號：步數數字
            'steps':(c,v)=>{
                c.lineWidth=15; c.strokeStyle='#f59e0b';
                c.beginPath(); c.arc(300,300,150,0,Math.PI*2); c.stroke();
                c.fillStyle='#f59e0b'; c.font="900 130px sans-serif"; c.textAlign="center";
                c.fillText(v||"0",300,345);
                s(c,300,140,300,40); // 畫一個指向前方的短箭頭提示
            }
        };

        // --- 🧭 導航邏輯 ---
        function refresh() {
            const pIdx = parseInt(localStorage.getItem(`p_${missionId}`)||"0");
            document.getElementById('prog').innerText = `${pIdx}/${points.length}`;
            if(!userPos || points.length===0) return;
            const t = points[pIdx];
            if(!t) { document.getElementById('statusMsg').innerText="🏁 MISSION COMPLETE"; ctx.clearRect(0,0,600,600); return; }
            const dist = getD(userPos.lat, userPos.lng, t.lat, t.lng);
            document.getElementById('debugDist').innerText = `DIST: ${Math.round(dist)}M`;
            ctx.clearRect(0,0,600,600);
            if(dist <= 15) { 
                if(SIGNS[t.type]) SIGNS[t.type](ctx, t.val); 
                document.getElementById('statusMsg').innerText="📍 發現追蹤符號";
                document.getElementById('statusMsg').classList.add('text-amber-500');
            } else { 
                document.getElementById('statusMsg').innerText="🔍 搜尋中..."; 
                document.getElementById('statusMsg').classList.remove('text-amber-500');
            }
        }

        // --- 🛠️ 領袖功能 ---
        window.joinMission = () => {
            missionId = document.getElementById('mi').value.toUpperCase().trim();
            if(!missionId) return;
            localStorage.setItem('last_id', missionId);
            const data = allMissions[missionId] || {points:[], isLocked:false};
            points=data.points; isLocked=data.isLocked;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('cid').innerText = missionId;
            window.saveLocal(); refresh();
        };

        window.watchGPS = () => {
            navigator.geolocation.watchPosition(p => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                currentAccuracy = p.coords.accuracy;
                document.getElementById('accuracyDisp').innerText = `ACC: ±${currentAccuracy.toFixed(1)}M`;
                document.getElementById('accuracyDisp').style.color = currentAccuracy < 10 ? '#39ff14' : '#f59e0b';
                refresh();
            }, null, { enableHighAccuracy: true });
            document.getElementById('gpsBtn').classList.replace('bg-blue-600', 'bg-green-800');
            document.getElementById('gpsBtn').innerText = "📡 監控進行中 (請保持螢幕開啟)";
        };

        window.dropPoint = (t, v=null) => {
            if(isLocked) return alert("已鎖定路徑");
            if(!userPos) return alert("等待 GPS 訊號...");
            if(navigator.vibrate) navigator.vibrate(80);
            document.getElementById('app').classList.add('flash-effect');
            setTimeout(()=>document.getElementById('app').classList.remove('flash-effect'),200);
            points.push({lat:userPos.lat, lng:userPos.lng, type:t, val:v, acc:currentAccuracy});
            window.saveLocal();
        };

        window.submitSteps = () => {
            const count = document.getElementById('stepCount').value;
            window.dropPoint('steps', count);
            window.closeStepModal();
        };

        window.processImport = () => {
            try {
                const data = JSON.parse(document.getElementById('importText').value);
                const mid = data.id || missionId || "IMPORTED";
                const newPts = data.p || [];
                let currentPts = allMissions[mid] ? allMissions[mid].points : [];
                let count = 0;
                newPts.forEach(np => {
                    const exists = currentPts.some(cp => Math.abs(cp.lat - np.lat) < 1e-6 && Math.abs(cp.lng - np.lng) < 1e-6);
                    if(!exists) { currentPts.push(np); count++; }
                });
                allMissions[mid] = { points: currentPts, isLocked: true };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allMissions));
                alert(`✅ 成功追加 ${count} 個點位！`);
                location.reload();
            } catch(e) { alert("❌ 無法識別 JSON 代碼"); }
        };

        window.exportQR = () => {
            if(points.length===0) return;
            const start = parseInt(prompt(`起始站 (1~${points.length})`, "1")) - 1;
            const end = parseInt(prompt(`結束站 (${start+1}~${points.length})`, points.length));
            if(isNaN(start)||isNaN(end)||start<0||end>points.length||start>=end) return alert("範圍無效");
            const compact = JSON.stringify({id: missionId, p: points.slice(start, end)});
            document.getElementById('qrTitle').innerText = `RANGE: ${start+1} - ${end}`;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById('qrcode'), { text: compact, width: 250, height: 250, correctLevel: QRCode.CorrectLevel.L });
            document.getElementById('qrWarning').classList.toggle('hidden', compact.length <= 1500);
            document.getElementById('qrModal').classList.remove('hidden');
        };

        // --- 輔助工具 ---
        function getD(la1,lo1,la2,lo2){const R=6371e3,f1=la1*Math.PI/180,f2=la2*Math.PI/180,df=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180,a=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
        window.saveLocal = () => { 
            allMissions[missionId] = {points, isLocked}; 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allMissions));
        };
        window.verifyLeader = () => { if(['0728','1201'].includes(document.getElementById('authPass').value)) { document.getElementById('leader').classList.remove('hidden'); window.closeAuthModal(); } else alert("ERR"); };
        window.nextStep = () => { const p = parseInt(localStorage.getItem(`p_${missionId}`)||"0"); if(p<points.length){ localStorage.setItem(`p_${missionId}`, p+1); refresh(); } };
        window.toggleLock = () => { isLocked=!isLocked; document.getElementById('lockToggle').innerText = isLocked ? "🔓 解除" : "🔒 鎖定"; window.saveLocal(); };
        window.exitMission = () => confirm("EXIT?") && location.reload();
        window.openAuthModal = () => document.getElementById('authModal').classList.remove('hidden');
        window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');
        window.openImportModal = () => document.getElementById('importModal').classList.remove('hidden');
        window.closeImportModal = () => document.getElementById('importModal').classList.add('hidden');
        window.closeQRModal = () => document.getElementById('qrModal').classList.add('hidden');
        window.openStepModal = () => document.getElementById('stepModal').classList.remove('hidden');
        window.closeStepModal = () => document.getElementById('stepModal').classList.add('hidden');
        window.clearCurrentPoints = () => confirm("確定清空所有點位？") && (points=[], window.saveLocal(), refresh());
        window.exportJSON = () => { navigator.clipboard.writeText(JSON.stringify({id: missionId, p: points})).then(()=>alert("JSON 已複製")); };
        window.onload = () => { if(localStorage.getItem('last_id')) document.getElementById('mi').value = localStorage.getItem('last_id'); };
    </script>
</body>
</html>
