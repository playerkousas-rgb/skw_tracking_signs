<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKW 追蹤符號系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'skw-tracking-logic';

        // 狀態管理
        let currentMissionId = localStorage.getItem('active_mission_id') || "";
        let points = [];
        let userPos = null;
        let isAdmin = false;
        let currentUser = null;
        let unlockDistance = 8; // 預設 8 公尺判定為到達

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        // 初始化 Auth
        const init = async () => {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (currentMissionId) join(currentMissionId);
            });
        };
        init();

        // 加入頻道
        window.join = (id) => {
            if(!id) return;
            currentMissionId = id.toUpperCase().trim();
            localStorage.setItem('active_mission_id', currentMissionId);
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('cid').innerText = currentMissionId;

            const mDoc = doc(db, 'artifacts', appId, 'public', 'data', 'missions', currentMissionId);
            onSnapshot(mDoc, (snap) => {
                if(snap.exists()) {
                    points = snap.data().points || [];
                    refresh();
                }
            });
        };

        // 核心邏輯：距離判定與符號解鎖
        function refresh() {
            const progress = parseInt(localStorage.getItem(`p_${currentMissionId}`) || "0");
            document.getElementById('prog').innerText = `${progress} / ${points.length}`;

            if (!userPos || points.length === 0) return;

            // 這裡我們判定的是「目前這一個 CP」
            // 成員必須先來到當前進度的座標，才能看到該處的符號
            const target = points[progress];
            if (target) {
                const d = getD(userPos.lat, userPos.lng, target.lat, target.lng);
                document.getElementById('debugDist').innerText = `距離目標: ${Math.round(d)}m`;

                if (d <= unlockDistance) {
                    // 到達範圍內！顯示符號
                    showSign(target);
                    document.getElementById('statusMsg').innerText = "📍 已到達 CP！請觀察地上符號";
                    document.getElementById('statusMsg').className = "text-green-400 font-bold animate-pulse";
                    
                    // 自動存檔進度（如果不是最後一個）
                    // 注意：通常是在成員看完符號，移動到下一個點一段距離後才自動跳下一個
                    // 或是提供一個「我已出發」按鈕
                    window.lastFoundIdx = progress;
                } else {
                    ctx.clearRect(0,0,600,600);
                    document.getElementById('statusMsg').innerText = "🔍 尋找下一個追蹤符號中...";
                    document.getElementById('statusMsg').className = "text-slate-400";
                    // 顯示模糊提示（可選）
                    if (d < 30) document.getElementById('statusMsg').innerText = "🔥 訊號增強！就在附近";
                }
            } else if (progress >= points.length && points.length > 0) {
                document.getElementById('statusMsg').innerText = "🏁 已完成所有追蹤路徑！";
                ctx.clearRect(0,0,600,600);
            }
        }

        window.nextStep = () => {
            const p = parseInt(localStorage.getItem(`p_${currentMissionId}`) || "0");
            if (p < points.length) {
                localStorage.setItem(`p_${currentMissionId}`, p + 1);
                refresh();
            }
        };

        // 繪圖與計算 (標準符號)
        const SIGNS = {
            'go': (c) => { s(c,300,500,300,100); s(c,300,100,220,200); s(c,300,100,380,200); },
            'left': (c) => { s(c,500,300,100,300); s(c,100,300,200,200); s(c,100,300,200,400); },
            'right': (c) => { s(c,100,300,500,300); s(c,500,300,400,200); s(c,500,300,400,400); },
            'msg': (c, v) => { 
                c.lineWidth=15; c.strokeStyle='#fbbf24'; c.beginPath(); c.arc(300,300,150,0,Math.PI*2); c.stroke();
                c.fillStyle='#fbbf24'; c.font="bold 80px sans-serif"; c.textAlign="center"; c.fillText(v||"?", 300, 330);
                s(c,300,150,300,50); s(c,300,50,260,90); s(c,300,50,340,90);
            },
            'end': (c) => { 
                c.lineWidth=15; c.strokeStyle='#ef4444'; c.beginPath(); c.arc(300,300,100,0,Math.PI*2); c.stroke();
                c.beginPath(); c.arc(300,300,40,0,Math.PI*2); c.fill();
            }
        };

        function s(c,x1,y1,x2,y2){ c.lineWidth=20; c.strokeStyle='#fbbf24'; c.lineCap='round'; c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke(); }
        
        function showSign(p) {
            ctx.clearRect(0,0,600,600);
            if(SIGNS[p.type]) SIGNS[p.type](ctx, p.val);
        }

        function getD(la1,lo1,la2,lo2){
            const R=6371e3, f1=la1*Math.PI/180, f2=la2*Math.PI/180, df=(la2-la1)*Math.PI/180, dl=(lo2-lo1)*Math.PI/180;
            const a=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
            return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        }

        window.watchGPS = () => {
            navigator.geolocation.watchPosition(p => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                refresh();
            }, null, {enableHighAccuracy:true});
        };

        // 領袖功能
        window.dropPoint = async (type) => {
            if(!userPos) return alert("等待 GPS...");
            const val = type === 'msg' ? prompt("幾步？") : null;
            points.push({ lat: userPos.lat, lng: userPos.lng, type, val });
            const mDoc = doc(db, 'artifacts', appId, 'public', 'data', 'missions', currentMissionId);
            await setDoc(mDoc, { points });
            alert(`已在目前位置設置: ${type}`);
        };

        window.toggleLeader = () => {
            if(prompt("密碼")==="1234") document.getElementById('leader').classList.toggle('hidden');
        };

        window.resetProg = () => {
            if(confirm("重置進度？")) {
                localStorage.setItem(`p_${currentMissionId}`, 0);
                location.reload();
            }
        };
    </script>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen">

    <!-- 入口 -->
    <div id="setup" class="p-10 text-center">
        <h1 class="text-4xl font-black text-amber-500 mb-4">SCOUT TRACKING</h1>
        <p class="text-stone-500 mb-10 italic">追蹤符號解密系統</p>
        <input id="mi" type="text" placeholder="輸入路徑 ID" class="w-full bg-stone-800 p-4 rounded-xl border border-stone-700 text-center mb-4 uppercase font-bold">
        <button onclick="join(document.getElementById('mi').value)" class="w-full bg-amber-600 py-4 rounded-xl font-bold">開始追蹤</button>
    </div>

    <!-- 主介面 -->
    <div id="app" class="hidden p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">頻道: <span id="cid" class="text-amber-500"></span></h2>
            <div class="flex gap-2 text-xs">
                <button onclick="toggleLeader()" class="p-2 bg-stone-800 rounded">🛠️</button>
                <button onclick="resetProg()" class="p-2 bg-stone-800 rounded text-red-400">重設</button>
            </div>
        </div>

        <!-- 狀態回饋 -->
        <div class="bg-stone-800 rounded-2xl p-6 mb-4 text-center border border-stone-700">
            <div id="prog" class="text-xs text-stone-500 mb-2">0 / 0</div>
            <div id="statusMsg" class="text-lg mb-2 italic">等待 GPS 訊號...</div>
            <div id="debugDist" class="text-[10px] opacity-30 font-mono">---</div>
        </div>

        <!-- 符號畫布 (平常是空白，只有到達才顯示) -->
        <div class="aspect-square bg-black rounded-3xl border-4 border-stone-800 shadow-inner flex items-center justify-center relative overflow-hidden">
            <canvas id="mainCanvas" width="600" height="600" class="w-full h-full p-8"></canvas>
            
            <!-- 如果成員找到了，顯示下一步按鈕 -->
            <button id="nextBtn" onclick="nextStep()" class="absolute bottom-4 right-4 bg-amber-500 text-black px-4 py-2 rounded-full font-bold text-sm shadow-xl active:scale-90">
                我已出發 ➔
            </button>
        </div>

        <button onclick="watchGPS()" class="w-full bg-blue-600 py-4 rounded-xl font-bold mt-6 shadow-lg active:scale-95 uppercase tracking-tighter">開啟追蹤雷達</button>

        <!-- 領袖工具 -->
        <div id="leader" class="mt-10 p-4 border-2 border-dashed border-stone-700 rounded-2xl hidden">
            <h3 class="text-center text-amber-500 font-bold mb-4">領袖部署工具</h3>
            <p class="text-[10px] text-stone-500 mb-4 text-center">站在你想要設為「路徑分叉點」的位置點擊按鈕：</p>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="dropPoint('go')" class="bg-stone-700 p-3 rounded text-xs">直行符號</button>
                <button onclick="dropPoint('left')" class="bg-stone-700 p-3 rounded text-xs">左轉符號</button>
                <button onclick="dropPoint('right')" class="bg-stone-700 p-3 rounded text-xs">右轉符號</button>
                <button onclick="dropPoint('msg')" class="bg-stone-700 p-3 rounded text-xs">步數符號</button>
                <button onclick="dropPoint('end')" class="bg-stone-700 p-3 rounded text-xs col-span-2">終點符號</button>
            </div>
            <p class="text-[10px] mt-4 text-red-500">注意：成員必須來到你現在站的地方，才會看到符號。</p>
        </div>
    </div>

</body>
</html>
