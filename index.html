<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKW GPS 雲端追蹤系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase 配置
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'skw-gps-tracker';

        // 全域變數
        let currentMissionId = localStorage.getItem('last_mission_id') || "";
        let missions = [];
        let userCoords = null;
        let isAdmin = false;
        let radarZoomRange = 50;
        let selectedSignIdx = 0;
        let selectedStepDir = 'straight';
        let currentUser = null;

        const canvas = document.getElementById('signCanvas');
        const ctx = canvas.getContext('2d');

        // --- 初始化 Auth ---
        const initAuth = async () => {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (currentMissionId) joinMission(currentMissionId);
            });
        };
        initAuth();

        // --- 核心邏輯：加入/切換頻道 ---
        window.joinMission = async (id) => {
            if (!id) return;
            currentMissionId = id.toUpperCase().trim();
            localStorage.setItem('last_mission_id', currentMissionId);
            document.getElementById('displayMissionId').innerText = `頻道: ${currentMissionId}`;
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');

            // 監聽雲端資料
            const missionDoc = doc(db, 'artifacts', appId, 'public', 'data', 'missions', currentMissionId);
            onSnapshot(missionDoc, (snapshot) => {
                if (snapshot.exists()) {
                    missions = snapshot.data().points || [];
                    updateScoutDisplay();
                    if (isAdmin) renderMissionList();
                } else {
                    missions = [];
                    updateScoutDisplay();
                }
            }, (err) => console.error("Snapshot error:", err));
        };

        window.exitMission = () => {
            localStorage.removeItem('last_mission_id');
            location.reload();
        };

        // --- 領袖部署功能 ---
        window.deployAtCurrentPos = async () => {
            if (!userCoords) return alert("請先啟動 GPS");
            if (!currentMissionId) return alert("尚未選定頻道");

            const sign = SIGNS[selectedSignIdx];
            const val = sign.hasValue ? document.getElementById('stepCount').value : null;
            const dir = sign.hasDir ? selectedStepDir : null;
            
            const newPoint = { 
                lat: userCoords.lat, 
                lng: userCoords.lng, 
                signIdx: selectedSignIdx, 
                signValue: val, 
                signDir: dir,
                id: Date.now() 
            };

            missions.push(newPoint);
            await saveToCloud();
            if (navigator.vibrate) navigator.vibrate(50);
        };

        const saveToCloud = async () => {
            if (!currentUser) return;
            const missionDoc = doc(db, 'artifacts', appId, 'public', 'data', 'missions', currentMissionId);
            await setDoc(missionDoc, { points: missions, lastUpdated: Date.now() });
        };

        // --- 繪圖與計算邏輯 (繼承自上一版) ---
        const SIGNS = [
            { id: 'straight', name: '向此方向走', draw: (ctx) => { stick(ctx, 300, 500, 300, 150); stick(ctx, 300, 150, 240, 230); stick(ctx, 300, 150, 360, 230); }},
            { id: 'left', name: '向左轉', draw: (ctx) => { stick(ctx, 450, 300, 150, 300); stick(ctx, 150, 300, 230, 230); stick(ctx, 150, 300, 230, 370); }},
            { id: 'right', name: '向右轉', draw: (ctx) => { stick(ctx, 150, 300, 450, 300); stick(ctx, 450, 300, 370, 230); stick(ctx, 450, 300, 370, 370); }},
            { id: 'steps', name: 'X 步後有信物', hasValue: true, hasDir: true, draw: (ctx, val, dir) => {
                ctx.lineWidth = 15; ctx.strokeStyle = '#261b13'; ctx.beginPath(); ctx.arc(300, 380, 120, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = '#261b13'; ctx.font = "bold 90px sans-serif"; ctx.textAlign = "center"; ctx.fillText(val || "0", 300, 410);
                if (dir === 'left') { stick(ctx, 400, 150, 200, 150); stick(ctx, 200, 150, 260, 100); stick(ctx, 200, 150, 260, 200); }
                else if (dir === 'right') { stick(ctx, 200, 150, 400, 150); stick(ctx, 400, 150, 340, 100); stick(ctx, 400, 150, 340, 200); }
                else { stick(ctx, 300, 230, 300, 80); stick(ctx, 300, 80, 250, 140); stick(ctx, 300, 80, 350, 140); }
            }},
            { id: 'danger', name: '有危險', draw: (ctx) => { drawStone(ctx, 300, 200, 45); drawStone(ctx, 240, 340, 50); drawStone(ctx, 360, 340, 48); }}
        ];

        function stick(ctx, x1, y1, x2, y2) { ctx.lineWidth = 16; ctx.strokeStyle = '#261b13'; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); }
        function drawStone(ctx, x, y, r) { ctx.fillStyle = '#64748b'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); }
        function drawSign(idx, val, dir) { ctx.clearRect(0,0,600,600); if(SIGNS[idx]) SIGNS[idx].draw(ctx, val, dir); }

        function getDist(la1, lo1, la2, lo2) {
            const R = 6371e3; const dLa = (la2-la1)*Math.PI/180; const dLo = (lo2-lo1)*Math.PI/180;
            const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(la1, lo1, la2, lo2) {
            const y = Math.sin((lo2-lo1)*Math.PI/180) * Math.cos(la2*Math.PI/180);
            const x = Math.cos(la1*Math.PI/180) * Math.sin(la2*Math.PI/180) - Math.sin(la1*Math.PI/180) * Math.cos(la2*Math.PI/180) * Math.cos((lo2-lo1)*Math.PI/180);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        window.updatePosition = (pos) => {
            userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('gpsStatus').innerText = "📡 定位已連線";
            document.getElementById('gpsStatus').className = "text-[10px] text-green-400 font-bold uppercase";
            updateScoutDisplay();
        };

        window.updateScoutDisplay = () => {
            const unlockedCount = parseInt(localStorage.getItem(`unlocked_${currentMissionId}`) || "0");
            const targetIndex = unlockedCount;
            const target = missions[targetIndex];
            
            document.getElementById('progressText').innerText = `${unlockedCount} / ${missions.length}`;
            
            if (target && userCoords) {
                const dist = getDist(userCoords.lat, userCoords.lng, target.lat, target.lng);
                const bearing = getBearing(userCoords.lat, userCoords.lng, target.lat, target.lng);
                document.getElementById('distDisplay').innerHTML = `${Math.round(dist)}<small class='text-sm opacity-40'>m</small>`;
                
                const dot = document.getElementById('targetDot');
                dot.style.display = 'block';
                const pixelDist = (Math.min(dist, radarZoomRange) / radarZoomRange) * 120;
                const angleRad = (bearing - 90) * Math.PI / 180;
                dot.style.left = `${120 + pixelDist * Math.cos(angleRad)}px`;
                dot.style.top = `${120 + pixelDist * Math.sin(angleRad)}px`;

                if (dist < 15) {
                    localStorage.setItem(`unlocked_${currentMissionId}`, unlockedCount + 1);
                    if(navigator.vibrate) navigator.vibrate([200,100,200]);
                    showUnlockedSign(target);
                } else {
                    document.getElementById('lockOverlay').classList.remove('hidden');
                }
            } else if (missions.length > 0 && unlockedCount >= missions.length) {
                document.getElementById('distDisplay').innerText = "FIN";
                showUnlockedSign(missions[missions.length-1]);
                document.getElementById('lockOverlay').classList.add('hidden');
            }
        };

        function showUnlockedSign(m) {
            document.getElementById('lockOverlay').classList.add('hidden');
            canvas.classList.remove('opacity-10');
            drawSign(m.signIdx, m.signValue, m.signDir);
        }

        // --- UI 控制 ---
        window.setZoom = (z) => { 
            radarZoomRange = z; 
            document.querySelectorAll('.zoom-btn').forEach(b => b.classList.toggle('bg-blue-600', b.id === `z-${z}`));
            updateScoutDisplay(); 
        };

        window.toggleAdmin = () => {
            const pw = prompt("請輸入領袖密碼:");
            if (pw === "1234") {
                isAdmin = !isAdmin;
                document.getElementById('leaderSection').classList.toggle('hidden', !isAdmin);
                if (isAdmin) renderMissionList();
            }
        };

        window.renderMissionList = () => {
            const list = document.getElementById('missionList');
            list.innerHTML = missions.map((m, i) => `
                <div class="bg-slate-700/50 p-3 rounded-lg flex justify-between items-center text-xs">
                    <span>#${i+1} - ${SIGNS[m.signIdx].name}</span>
                    <button onclick="removePoint(${i})" class="text-red-400">刪除</button>
                </div>
            `).join('');
        };

        window.removePoint = async (i) => {
            missions.splice(i, 1);
            await saveToCloud();
        };

        window.startGPS = () => {
            navigator.geolocation.watchPosition(updatePosition, (e) => alert("請開啟 GPS"), { enableHighAccuracy: true });
        };

        // 初始化符號選擇器
        window.onload = () => {
            const grid = document.getElementById('signSelectorGrid');
            SIGNS.forEach((s, i) => {
                const btn = document.createElement('button');
                btn.className = "p-2 bg-slate-700 rounded text-[10px]";
                btn.innerText = s.name;
                btn.onclick = () => {
                    selectedSignIdx = i;
                    document.getElementById('stepExtra').classList.toggle('hidden', !s.hasValue);
                };
                grid.appendChild(btn);
            });
        };
    </script>
    <style>
        .radar-ring { border: 1px solid rgba(34, 197, 94, 0.2); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .radar-sweep { position: absolute; inset: 0; background: conic-gradient(from 0deg, rgba(34, 197, 94, 0.2) 0deg, transparent 90deg); border-radius: 50%; animation: sweep 4s linear infinite; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <!-- 1. 入口畫面：選擇頻道 -->
    <div id="setupScreen" class="flex flex-col items-center justify-center min-h-screen p-8">
        <h1 class="text-3xl font-black text-amber-500 mb-2 italic">SKW TRACKER</h1>
        <p class="text-slate-500 text-sm mb-8 uppercase tracking-widest">雲端路徑同步系統</p>
        
        <div class="w-full max-w-xs space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">請輸入路徑代碼 (Mission ID)</label>
                <input type="text" id="missionInput" placeholder="例如: TEAM_A" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-center text-xl font-bold uppercase focus:border-amber-500 outline-none mt-1">
            </div>
            <button onclick="joinMission(document.getElementById('missionInput').value)" class="w-full bg-amber-500 text-slate-900 font-black py-4 rounded-2xl shadow-xl">進入路徑</button>
            <p class="text-[10px] text-slate-600 text-center uppercase">領袖與成員必須使用相同代碼</p>
        </div>
    </div>

    <!-- 2. 主應用程式 -->
    <div id="mainApp" class="hidden p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 id="displayMissionId" class="font-black text-amber-500 italic">頻道: ---</h2>
                <p id="gpsStatus" class="text-[10px] text-slate-500 font-bold uppercase">等待 GPS 訊號...</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleAdmin()" class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-xs">🛠️</button>
                <button onclick="exitMission()" class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-xs">🚪</button>
            </div>
        </div>

        <!-- 雷達 & 距離 -->
        <div class="bg-slate-800 rounded-3xl p-6 border border-slate-700 shadow-2xl relative overflow-hidden mb-4">
            <div class="flex justify-between mb-4">
                <span id="distDisplay" class="text-4xl font-black font-mono tracking-tighter">---</span>
                <span id="progressText" class="text-xl font-bold text-amber-500 italic">0/0</span>
            </div>

            <div class="w-[240px] h-[240px] mx-auto relative mb-4 bg-slate-900 rounded-full border border-green-500/20">
                <div class="radar-sweep"></div>
                <div class="radar-ring w-full h-full"></div>
                <div class="radar-ring w-2/3 h-2/3"></div>
                <div class="radar-ring w-1/3 h-1/3"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 bg-blue-500 rounded-full border-2 border-white"></div>
                <div id="targetDot" class="absolute w-3 h-3 bg-red-500 rounded-full border-2 border-white shadow-[0_0_10px_red] hidden transition-all"></div>
            </div>

            <div class="flex justify-center gap-2">
                <button onclick="setZoom(200)" id="z-200" class="zoom-btn px-3 py-1 bg-slate-700 rounded-full text-[10px] font-bold">200m</button>
                <button onclick="setZoom(50)" id="z-50" class="zoom-btn px-3 py-1 bg-blue-600 rounded-full text-[10px] font-bold">50m</button>
                <button onclick="setZoom(15)" id="z-15" class="zoom-btn px-3 py-1 bg-slate-700 rounded-full text-[10px] font-bold">15m</button>
            </div>
        </div>

        <!-- 符號顯示區 -->
        <div class="relative bg-amber-900/20 rounded-3xl h-[300px] border-4 border-slate-800 flex items-center justify-center overflow-hidden">
            <div id="lockOverlay" class="absolute inset-0 bg-slate-900/90 z-10 flex flex-col items-center justify-center p-8 text-center">
                <span class="text-4xl mb-2">📡</span>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">請進入目標範圍 15m 內以解鎖</p>
            </div>
            <canvas id="signCanvas" width="600" height="600" class="w-full h-full opacity-10"></canvas>
        </div>

        <button onclick="startGPS()" class="w-full bg-blue-600 py-4 rounded-2xl font-black mt-4 shadow-xl active:scale-95 transition-all uppercase tracking-widest">啟動追蹤儀</button>

        <!-- 領袖編輯區 -->
        <div id="leaderSection" class="mt-8 p-6 bg-slate-800 rounded-3xl border border-amber-500/30 hidden">
            <h3 class="font-black text-amber-500 mb-4">領袖部署面板</h3>
            <div id="signSelectorGrid" class="grid grid-cols-2 gap-2 mb-4"></div>
            <div id="stepExtra" class="hidden mb-4">
                <input type="number" id="stepCount" value="20" class="bg-slate-900 p-2 rounded w-full mb-2">
                <select id="stepDir" class="bg-slate-900 p-2 rounded w-full" onchange="selectedStepDir=this.value">
                    <option value="straight">直行</option>
                    <option value="left">左轉</option>
                    <option value="right">右轉</option>
                </select>
            </div>
            <button onclick="deployAtCurrentPos()" class="w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-xl mb-4">投放目前位置</button>
            <div id="missionList" class="space-y-2"></div>
        </div>
    </div>

</body>
</html>
