<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKW 追蹤系統 - 領袖增強終極版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .modal-blur { backdrop-filter: blur(8px); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .sign-card { transition: all 0.2s ease; cursor: pointer; }
        .sign-card:active { transform: scale(0.95); }
        .is-locked { opacity: 0.5; pointer-events: none; grayscale: 1; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes warn-flash { 0%, 100% { background: #7f1d1d; } 50% { background: #450a0a; } }
        .gps-warning { animation: warn-flash 1s infinite; }
    </style>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen font-sans select-none overflow-x-hidden" oncontextmenu="return false;">
    <div id="setup" class="p-10 text-center flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-4xl font-black text-amber-500 mb-2 tracking-tighter italic">SKW TRACKING</h1>
        <p class="text-stone-500 mb-8 uppercase tracking-[0.3em] text-[10px] font-bold">本地離線同步版本 v5.2（廣東話語音導航）</p>
       
        <div class="max-w-xs w-full space-y-4">
            <input id="mi" type="text" placeholder="輸入路徑 ID" class="w-full bg-stone-800 p-5 rounded-2xl border border-stone-700 text-center uppercase font-black text-2xl outline-none focus:border-amber-500 transition-all shadow-inner">
            <button onclick="window.joinMission()" class="w-full bg-amber-600 hover:bg-amber-500 py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">進入路徑</button>
            <button onclick="window.openImportModal()" class="w-full text-stone-500 text-xs py-2 underline">📥 導入/追加情報 (JSON)</button>
        </div>
        <div class="mt-16 text-stone-600 text-[9px] font-bold tracking-widest">
            COPYRIGHT © 2026 SKW TRACKING SYSTEM. <br> ALL RIGHTS RESERVED BY LEADER.
        </div>
    </div>
    <div id="app" class="hidden p-4 max-w-md mx-auto pb-32">
        <div id="gpsWarnTag" class="hidden gps-warning text-white text-[10px] font-black text-center py-1 mb-2 rounded-full">⚠️ GPS 訊號微弱：請移動到開闊空地</div>
        <div class="flex justify-between items-center mb-6 bg-stone-800/90 p-4 rounded-3xl border border-stone-700 backdrop-blur-xl sticky top-4 z-40 shadow-2xl">
            <div class="pl-2">
                <span id="accText" class="text-[10px] text-stone-500 block uppercase font-bold tracking-widest">Local Mode</span>
                <h2 id="cid" class="text-xl font-black text-amber-500 tracking-widest uppercase italic">---</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="window.openAuthModal()" class="w-12 h-12 flex items-center justify-center bg-stone-700 rounded-2xl border border-stone-600 shadow-lg text-lg hover:bg-stone-600 transition-colors">🛠️</button>
                <button onclick="window.exitMission()" class="w-12 h-12 flex items-center justify-center bg-stone-700 rounded-2xl text-stone-400 border border-stone-600 shadow-lg">✕</button>
            </div>
        </div>
        <div class="bg-stone-800 rounded-[2rem] p-6 mb-4 text-center border border-stone-700 shadow-xl relative">
            <div id="prog" class="absolute top-4 right-6 text-[10px] text-amber-500 font-mono font-bold bg-black/40 px-3 py-1 rounded-full">0/0</div>
            <div id="statusMsg" class="text-lg mb-2 italic h-12 flex items-center justify-center font-bold text-stone-300 uppercase tracking-widest">請啟動定位</div>
            <div id="debugDist" class="text-[9px] text-stone-500 font-mono tracking-[0.3em] uppercase">WAITING GPS...</div>
        </div>
        <div class="aspect-square bg-stone-950 rounded-[3.5rem] border-8 border-stone-800 shadow-2xl flex items-center justify-center relative overflow-hidden">
            <canvas id="mainCanvas" width="600" height="600" class="w-full h-full p-16 z-10"></canvas>
            <button onclick="window.nextStep()" class="absolute bottom-8 right-8 bg-amber-500 text-black px-8 py-4 rounded-full font-black text-xs shadow-2xl active:scale-90 transition-all uppercase tracking-widest border-b-4 border-amber-700">完成此站 ➔</button>
        </div>
        <button id="gpsBtn" onclick="window.watchGPS()" class="w-full bg-blue-600 py-6 rounded-3xl font-black mt-8 shadow-xl active:scale-95 transition-all tracking-[0.4em] text-sm border-b-4 border-blue-800">📡 啟動追蹤儀器</button>
        <div id="leader" class="mt-12 space-y-8 hidden animate-slide-up pb-20">
            <div class="h-px bg-stone-700 w-full"></div>
            <div class="flex justify-between items-center">
                <h3 class="text-amber-500 font-black uppercase tracking-[0.2em] text-sm">領袖工具面板</h3>
                <button id="lockToggle" onclick="window.toggleLock()" class="text-[10px] bg-stone-800 px-4 py-2 rounded-full border border-stone-600 font-bold uppercase tracking-widest text-amber-500">🔒 鎖定路徑</button>
            </div>
            <div id="editorControls" class="grid grid-cols-3 gap-3">
                <button onclick="window.dropPoint('go')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⬆️走</button>
                <button onclick="window.dropPoint('left')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⬅️左</button>
                <button onclick="window.dropPoint('right')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">➡️右</button>
                <button onclick="window.dropPoint('wrong')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold text-red-500">❌錯</button>
                <button onclick="window.dropPoint('danger')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold text-orange-400">⚠️危</button>
                <button onclick="window.dropPoint('split')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold text-blue-400">🔱分</button>
                <button onclick="window.dropPoint('wait')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⏸等</button>
                <button onclick="window.dropPoint('home')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold text-amber-500">🏠家</button>
                <button onclick="window.dropPoint('block')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⛰️障</button>
                <button onclick="window.openStepModal()" class="sign-card bg-amber-900/20 border border-amber-600/30 p-4 rounded-2xl text-[10px] font-bold col-span-3">👣 X 步後有信物</button>
            </div>
            <div class="bg-stone-900 rounded-3xl p-5 border border-stone-700">
                <div class="flex justify-between items-center mb-3">
                    <h4 class="text-stone-400 font-bold text-sm uppercase tracking-widest">GPS 觸發距離</h4>
                    <span id="currentDistShow" class="text-amber-500 font-mono text-lg font-black">5</span>
                </div>
                <div class="flex items-center gap-4">
                    <input id="triggerDistInput" type="number" min="1" max="30" step="1" value="5"
                           class="flex-1 bg-stone-800 text-center font-mono text-3xl font-black text-amber-500 rounded-2xl p-4 border border-stone-600 outline-none">
                    <span class="text-stone-400 text-xl">米</span>
                    <button onclick="window.setTriggerDistance()" 
                            class="bg-amber-600 hover:bg-amber-500 px-8 py-4 rounded-2xl font-black text-sm shadow-inner">確認調整</button>
                </div>
                <p class="text-[10px] text-stone-500 mt-2 text-center">越小越精準（建議 3～8 米）</p>
            </div>
            <div class="bg-stone-800/50 rounded-3xl p-6 border border-stone-700">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="text-stone-500 font-bold text-[10px] uppercase tracking-widest">路徑站點明細</h4>
                    <button onclick="window.clearCurrentPoints()" class="text-red-500 text-[10px] font-black border border-red-900/30 px-3 py-1 rounded-full bg-red-900/10 active:bg-red-900/30">🚨 一鍵清空</button>
                </div>
                <div id="pointList" class="space-y-2 max-h-60 overflow-y-auto pr-2 text-xs"></div>
            </div>
            <div id="rootTools" class="mt-8 pt-8 border-t border-stone-700 space-y-4 hidden">
                <p class="text-[10px] text-stone-500 font-bold uppercase tracking-widest text-center">備份、分段、與 QR 導出</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="window.exportMissionJSON()" class="bg-stone-700 py-4 rounded-2xl text-xs font-bold border border-stone-600 active:bg-amber-600">📄 導出 JSON</button>
                    <button onclick="window.exportQRRange()" class="bg-stone-700 py-4 rounded-2xl text-xs font-bold border border-stone-600 active:bg-green-600">📤 導出 QR</button>
                </div>
                <button onclick="window.purgeEverything()" class="w-full bg-red-900/30 text-red-500 py-4 rounded-2xl text-[10px] font-black border border-red-900/50">🚨 抹除此機「所有」頻道數據</button>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/80 modal-blur" onclick="window.closeAuthModal()"></div>
        <div class="bg-stone-800 w-full max-w-xs p-8 rounded-[3rem] border border-stone-700 animate-slide-up shadow-2xl text-center">
            <h3 class="text-xl font-black mb-6 text-amber-500">權限驗證</h3>
            <input id="authPass" type="password" placeholder="輸入密碼" class="w-full bg-stone-900 p-4 rounded-2xl mb-4 border border-stone-700 text-center outline-none text-2xl font-bold tracking-widest focus:border-amber-500">
            <button onclick="window.verifyLeader()" class="w-full bg-amber-600 py-4 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition-all">驗證</button>
        </div>
    </div>
    <div id="importModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/80 modal-blur" onclick="window.closeImportModal()"></div>
        <div class="bg-stone-800 w-full max-w-xs p-8 rounded-[3rem] border border-stone-700 animate-slide-up text-center shadow-2xl">
            <h3 class="text-xl font-black mb-4 text-amber-500">導入/更新路徑</h3>
            <textarea id="importText" placeholder="在此貼上 JSON 數據..." class="w-full bg-stone-900 p-4 rounded-2xl mb-4 border border-stone-700 text-xs font-mono h-40 outline-none focus:border-amber-500"></textarea>
            <div class="flex gap-2">
                <button onclick="window.processImport(false)" class="flex-1 bg-stone-700 py-4 rounded-2xl font-bold text-xs">⚠️ 覆蓋</button>
                <button onclick="window.processImport(true)" class="flex-1 bg-amber-600 py-4 rounded-2xl font-bold text-xs">➕ 追加 (不覆蓋)</button>
            </div>
        </div>
    </div>
    <div id="qrModal" class="fixed inset-0 z-[200] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/95 modal-blur" onclick="window.closeQRModal()"></div>
        <div class="bg-white p-8 rounded-[3rem] animate-slide-up text-center w-full max-w-xs">
            <h3 id="qrRangeTitle" class="text-black font-black mb-4 text-sm uppercase">PATH DATA QR</h3>
            <div id="qrcode" class="flex justify-center mb-6"></div>
            <button onclick="window.closeQRModal()" class="text-stone-500 underline font-black text-[10px]">關閉視窗</button>
        </div>
    </div>
    <div id="stepModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/80 modal-blur" onclick="window.closeStepModal()"></div>
        <div class="bg-stone-800 w-full max-w-xs p-8 rounded-[3rem] border border-stone-700 animate-slide-up text-center">
            <h3 class="text-xl font-black mb-2 text-amber-500 italic">信物步數</h3>
            <input id="stepCount" type="number" value="20" class="w-full bg-stone-900 p-4 rounded-2xl mb-6 border border-stone-700 text-center text-4xl font-black outline-none">
            <button onclick="window.submitSteps()" class="w-full bg-amber-600 py-4 rounded-2xl font-bold text-sm">確認佈置</button>
        </div>
    </div>

    <script>
        // 🔐 防偷竊機制
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 123)) return false;
            if (e.keyCode === 123) return false;
        };

        const STORAGE_KEY = 'skw_tracker_v2_local';
        const s=(c,x1,y1,x2,y2)=>{c.lineCap='round';c.lineWidth=26;c.strokeStyle='#78350f';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.lineWidth=18;c.strokeStyle='#f59e0b';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();};
        const SIGNS={'go':(c)=>{s(c,300,520,300,80);s(c,300,80,220,180);s(c,300,80,380,180);},'left':(c)=>{s(c,520,300,80,300);s(c,80,300,180,220);s(c,80,300,180,380);},'right':(c)=>{s(c,80,300,520,300);s(c,520,300,420,220);s(c,520,300,420,380);},'wrong':(c)=>{s(c,150,150,450,450);s(c,450,150,150,450);},'danger':(c)=>{const st=(x,y,r)=>{c.fillStyle='#57534e';c.beginPath();for(let i=0;i<6;i++){let a=i*Math.PI/3;let dr=r*(0.8+Math.random()*0.4);c.lineTo(x+Math.cos(a)*dr,y+Math.sin(a)*dr);}c.closePath();c.fill();};st(300,200,60);st(220,380,60);st(380,380,60);},'split':(c)=>{s(c,300,520,300,300);s(c,300,300,150,150);s(c,300,300,450,150);},'wait':(c)=>{s(c,150,200,450,200);s(c,150,300,450,300);s(c,150,400,450,400);},'home':(c)=>{c.lineWidth=20;c.strokeStyle='#f59e0b';c.beginPath();c.arc(300,300,180,0,Math.PI*2);c.stroke();c.fillStyle='#f59e0b';c.beginPath();c.arc(300,300,30,0,Math.PI*2);c.fill();},'block':(c)=>{s(c,100,450,300,150);s(c,300,150,500,450);},'steps':(c,v)=>{c.lineWidth=15;c.strokeStyle='#f59e0b';c.beginPath();c.arc(300,300,150,0,Math.PI*2);c.stroke();c.fillStyle='#f59e0b';c.font="900 120px sans-serif";c.textAlign="center";c.fillText(v||"0",300,345);s(c,300,140,300,40);}};

        const NON_SEQ_TYPES = new Set(['wrong', 'danger', 'split']);
        let triggerDistance = 5;
        let missionId="", points=[], isLocked=false, userPos=null;
        let allMissions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        let lastSpokenIndex = -1;   // 用來防止重複語音

        const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

        // ==================== 廣東話語音函數 ====================
        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'yue-HK';     // 香港廣東話
                utterance.rate = 1.08;         // 語速
                utterance.pitch = 1.0;
                speechSynthesis.cancel();
                speechSynthesis.speak(utterance);
            }
        }

        window.joinMission = () => {
            missionId = document.getElementById('mi').value.toUpperCase().trim();
            if(!missionId) return;
            localStorage.setItem('last_id', missionId);
            const data = allMissions[missionId] || {points:[], isLocked:false, triggerDistance:5};
            points = (data.points || []).map(p => ({
                ...p,
                sequential: p.sequential !== undefined ? p.sequential : !NON_SEQ_TYPES.has(p.type)
            }));
            isLocked = data.isLocked || false;
            triggerDistance = data.triggerDistance || 5;
            lastSpokenIndex = -1;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('cid').innerText = missionId;
            window.updateUIState(); refresh();
        };

        window.verifyLeader = () => {
            const p = document.getElementById('authPass').value;
            if(p==="0728" || p==="1201") {
                document.getElementById('leader').classList.remove('hidden');
                document.getElementById('rootTools').classList.toggle('hidden', p!=="1201");
                document.getElementById('triggerDistInput').value = triggerDistance;
                document.getElementById('currentDistShow').innerText = triggerDistance;
                window.closeAuthModal();
            } else alert("密碼錯誤");
        };

        window.setTriggerDistance = () => {
            const input = document.getElementById('triggerDistInput');
            let val = parseFloat(input.value);
            if (isNaN(val) || val < 1 || val > 30) {
                alert("請輸入 1～30 之間的數字");
                input.value = triggerDistance;
                return;
            }
            triggerDistance = val;
            document.getElementById('currentDistShow').innerText = val;
            window.saveLocal();
            refresh();
            alert(`✅ GPS 觸發距離已調整為 ${val} 米`);
        };

        window.watchGPS = () => {
            navigator.geolocation.watchPosition(p=>{
                userPos={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy};
                const isPoor = p.coords.accuracy > 20;
                document.getElementById('gpsWarnTag').classList.toggle('hidden', !isPoor);
                document.getElementById('accText').innerText = `ACC: ±${Math.round(p.coords.accuracy)}M`;
                document.getElementById('accText').classList.toggle('text-red-500', isPoor);
                refresh();
            }, e=>{alert("GPS 定位失敗，請確認權限");}, {enableHighAccuracy:true, timeout: 5000});
            document.getElementById('gpsBtn').innerText="📡 儀器運行中";
            document.getElementById('gpsBtn').classList.replace('bg-blue-600', 'bg-green-800');
        };

        window.processImport = (append) => {
            try {
                const raw = document.getElementById('importText').value;
                const d = JSON.parse(raw);
                const importedPoints = (d.points || []).map(p => ({
                    ...p,
                    sequential: p.sequential !== undefined ? p.sequential : !NON_SEQ_TYPES.has(p.type)
                }));
                if (append) {
                    points = [...points, ...importedPoints];
                } else {
                    points = importedPoints;
                    isLocked = d.isLocked || false;
                    triggerDistance = d.triggerDistance || 5;
                }
                lastSpokenIndex = -1;
                window.saveLocal();
                refresh();
                alert(append ? "已成功追加點位！" : "已成功覆蓋數據！");
                window.closeImportModal();
            } catch(e) { alert("JSON 格式不正確"); }
        };

        window.exportQRRange = () => {
            const start = parseInt(prompt("起始站號 (例如 1):", "1")) - 1;
            const end = parseInt(prompt(`結束站號 (最大 ${points.length}):`, points.length));
            if(isNaN(start) || isNaN(end)) return;
            const subPoints = points.slice(start, end);
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById('qrcode'), {
                text: JSON.stringify({ missionId, points: subPoints, triggerDistance }),
                width: 200, height: 200
            });
            document.getElementById('qrRangeTitle').innerText = `第 ${start+1} 至 ${end} 站數據`;
            document.getElementById('qrModal').classList.remove('hidden');
        };

        window.saveLocal=()=>{allMissions[missionId]={points,isLocked,triggerDistance};localStorage.setItem(STORAGE_KEY,JSON.stringify(allMissions));window.updateUIState();};

        window.dropPoint=(t,v=null)=>{
            if(isLocked)return alert("路徑已鎖定");
            if(!userPos)return alert("等待 GPS...");
            const sequential = !NON_SEQ_TYPES.has(t);
            points.push({lat:userPos.lat,lng:userPos.lng,type:t,val:v, sequential: sequential});
            window.saveLocal();
            refresh();
        };

        function refresh(){
            const seqPoints = points.filter(p => p.sequential);
            const pIdx = parseInt(localStorage.getItem(`p_${missionId}`)||"0");
            document.getElementById('prog').innerText = `${pIdx}/${seqPoints.length}`;

            if(!userPos || points.length===0){
                ctx.clearRect(0,0,600,600);
                return;
            }

            // 自由觸發的陷阱
            let triggeredHazard = null;
            let minDistHazard = Infinity;
            for(const pt of points){
                if(!pt.sequential){
                    const distH = getD(userPos.lat, userPos.lng, pt.lat, pt.lng);
                    if(distH <= triggerDistance && distH < minDistHazard){
                        minDistHazard = distH;
                        triggeredHazard = pt;
                    }
                }
            }

            ctx.clearRect(0,0,600,600);

            if(triggeredHazard){
                if(SIGNS[triggeredHazard.type]) SIGNS[triggeredHazard.type](ctx, triggeredHazard.val);
                let label = triggeredHazard.type === 'wrong' ? '錯路' : 
                           triggeredHazard.type === 'danger' ? '危險' : '分岔';
                document.getElementById('statusMsg').innerText = `⚠️ 發現${label}`;
                document.getElementById('debugDist').innerText = `陷阱 ${Math.round(minDistHazard)}M`;

                let hazardText = "注意！發現錯路";
                if (triggeredHazard.type === 'danger') hazardText = "注意！發現危險區域";
                if (triggeredHazard.type === 'split') hazardText = "注意！前面有分岔";
                
                if (lastSpokenIndex !== -100) {
                    speak(hazardText);
                    lastSpokenIndex = -100;
                }
                return;
            }

            // 主路徑
            if(pIdx >= seqPoints.length){
                document.getElementById('statusMsg').innerText="🏁 抵達終點";
                if (lastSpokenIndex !== -999) {
                    speak("恭喜！已到達終點");
                    lastSpokenIndex = -999;
                }
                return;
            }

            const t = seqPoints[pIdx];
            const dist = getD(userPos.lat, userPos.lng, t.lat, t.lng);
            document.getElementById('debugDist').innerText = `${Math.round(dist)}M`;

            if(dist <= triggerDistance){
                if(SIGNS[t.type]) SIGNS[t.type](ctx, t.val);
                document.getElementById('statusMsg').innerText="📍 發現號誌";

                if (pIdx !== lastSpokenIndex) {
                    speak(`已到達第 ${pIdx + 1} 站，請跟住號誌指示`);
                    lastSpokenIndex = pIdx;
                }
            } else {
                document.getElementById('statusMsg').innerText="🔍 搜尋中";
            }
        }

        function getD(la1,lo1,la2,lo2){
            const R=6371e3,f1=la1*Math.PI/180,f2=la2*Math.PI/180,df=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180,a=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
            return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        }

        window.updateUIState=()=>{
            document.getElementById('pointList').innerHTML=points.map((p,i)=>{
                const label = p.sequential ? '📍順序' : '⚠️自由';
                return `<div class="flex justify-between items-center p-3 bg-stone-900 mb-2 rounded-xl border border-stone-700/50"><span class="font-mono text-amber-500">${i+1}. ${label} ${p.type}${p.val ? ` (${p.val})` : ''}</span><button onclick="points.splice(${i},1);window.saveLocal();refresh();" class="text-red-500 px-2 font-bold">✕</button></div>`;
            }).join('');
        };

        window.nextStep=()=>{const p=parseInt(localStorage.getItem(`p_${missionId}`)||"0");localStorage.setItem(`p_${missionId}`,p+1);refresh();};
        window.toggleLock=()=>{isLocked=!isLocked;document.getElementById('lockToggle').innerText=isLocked?"🔓 解除鎖定":"🔒 鎖定路徑";window.saveLocal();};
        window.exitMission=()=>{if(confirm("退出？"))location.reload();};
        window.clearCurrentPoints=()=>{if(confirm("清空？")){points=[];localStorage.setItem(`p_${missionId}`,0);lastSpokenIndex=-1;window.saveLocal();refresh();}};
        window.purgeEverything=()=>{if(confirm("抹除所有頻道？")){localStorage.clear();location.reload();}};
        window.exportMissionJSON=()=>{navigator.clipboard.writeText(JSON.stringify({missionId,points,isLocked,triggerDistance})).then(()=>alert("JSON 複製成功"));};
        window.openAuthModal=()=>document.getElementById('authModal').classList.remove('hidden');
        window.closeAuthModal=()=>document.getElementById('authModal').classList.add('hidden');
        window.openImportModal=()=>document.getElementById('importModal').classList.remove('hidden');
        window.closeImportModal=()=>document.getElementById('importModal').classList.add('hidden');
        window.openStepModal=()=>document.getElementById('stepModal').classList.remove('hidden');
        window.closeStepModal=()=>document.getElementById('stepModal').classList.add('hidden');
        window.closeQRModal=()=>document.getElementById('qrModal').classList.add('hidden');
        window.submitSteps=()=>{window.dropPoint('steps',document.getElementById('stepCount').value);window.closeStepModal();};

        window.onload=()=>{if(localStorage.getItem('last_id'))document.getElementById('mi').value=localStorage.getItem('last_id');};
    </script>
</body>
</html>
