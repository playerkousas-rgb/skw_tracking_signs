<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKW 電子追蹤符號 </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .modal-blur { backdrop-filter: blur(12px); }
        @keyframes flash { 0% { background: rgba(245,158,11,0.5); } 100% { background: transparent; } }
        .flash-effect { animation: flash 0.2s ease-out; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; }
        #qrcode img { margin: auto; border: 12px solid white; border-radius: 12px; }
    </style>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen font-sans overflow-x-hidden" oncontextmenu="return false;">

    <div id="setup" class="p-10 text-center flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-5xl font-black text-amber-500 mb-2 tracking-tighter italic">SKW TRACKING</h1>
        <p class="text-stone-500 mb-12 uppercase tracking-[0.3em] text-[10px] font-bold">SYSTEM V3.8 (MERGE MODE)</p>
        
        <div class="max-w-xs w-full space-y-4">
            <input id="mi" type="text" placeholder="輸入頻道 ID" class="w-full bg-stone-800 p-5 rounded-2xl border border-stone-700 text-center uppercase font-black text-2xl focus:border-amber-500 transition-all shadow-inner text-amber-500">
            <button onclick="window.joinMission()" class="w-full bg-amber-600 hover:bg-amber-500 py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">開啟儀器</button>
            <button onclick="window.openImportModal()" class="w-full text-stone-500 text-xs py-2 underline decoration-stone-700">📥 導入/追加 領袖情報</button>
        </div>

        <footer class="absolute bottom-8 w-full text-[9px] text-stone-600 font-bold tracking-widest uppercase">
            © 2024-2026 SKW SCOUT GROUP. ALL RIGHTS RESERVED.
        </footer>
    </div>

    <div id="app" class="hidden p-4 max-w-md mx-auto pb-32">
        <div class="flex justify-between items-center mb-4 bg-stone-800/90 p-4 rounded-3xl border border-stone-700 backdrop-blur-xl sticky top-4 z-40 shadow-2xl">
            <div>
                <span id="accuracyDisp" class="text-[9px] text-stone-500 block uppercase font-bold tracking-widest tracking-tighter">GPS 待機中</span>
                <h2 id="cid" class="text-xl font-black text-amber-500 tracking-widest uppercase italic">---</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="window.openAuthModal()" class="w-12 h-12 flex items-center justify-center bg-stone-700 rounded-2xl border border-stone-600 shadow-lg text-lg">🛠️</button>
                <button onclick="window.exitMission()" class="w-12 h-12 flex items-center justify-center bg-stone-700 rounded-2xl text-stone-400 border border-stone-600 shadow-lg">✕</button>
            </div>
        </div>

        <div id="radarArea" class="space-y-4">
            <div class="bg-stone-800 rounded-[2rem] p-5 text-center border border-stone-700 shadow-xl relative">
                <div id="prog" class="absolute top-4 right-6 text-[10px] text-amber-500 font-mono font-bold bg-black/40 px-3 py-1 rounded-full">0/0</div>
                <div id="statusMsg" class="text-lg mb-1 italic h-10 flex items-center justify-center font-bold text-stone-300">請啟動定位儀</div>
                <div id="debugDist" class="text-[10px] text-stone-500 font-mono tracking-widest uppercase">WAITING GPS...</div>
            </div>
            <div class="aspect-square bg-stone-950 rounded-[3rem] border-8 border-stone-800 shadow-2xl flex items-center justify-center relative overflow-hidden">
                <canvas id="mainCanvas" width="600" height="600" class="w-full h-full p-12 z-10"></canvas>
                <button onclick="window.nextStep()" class="absolute bottom-6 right-6 bg-amber-500 text-black px-6 py-3 rounded-full font-black text-xs shadow-2xl active:scale-90 transition-all border-b-4 border-amber-700">下一站 ➔</button>
            </div>
        </div>

        <button id="gpsBtn" onclick="window.watchGPS()" class="w-full bg-blue-600 py-6 rounded-3xl font-black mt-6 shadow-xl active:scale-95 transition-all tracking-[0.4em] text-sm border-b-4 border-blue-800">📡 啟動追蹤儀器</button>

        <div id="leader" class="mt-8 space-y-6 hidden pb-20">
            <div class="h-px bg-stone-700 w-full"></div>
            <div class="flex justify-between items-center px-2">
                <h3 class="text-amber-500 font-black uppercase tracking-widest text-sm italic">Leader Dashboard</h3>
                <button onclick="window.toggleLock()" id="lockToggle" class="text-[10px] bg-stone-800 px-4 py-2 rounded-full border border-stone-600 font-bold">🔒 鎖定</button>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <button onclick="window.dropPoint('go')" class="bg-stone-800 p-4 rounded-2xl text-[10px] font-bold">⬆️走</button>
                <button onclick="window.dropPoint('left')" class="bg-stone-800 p-4 rounded-2xl text-[10px] font-bold">⬅️左</button>
                <button onclick="window.dropPoint('right')" class="bg-stone-800 p-4 rounded-2xl text-[10px] font-bold">➡️右</button>
                <button onclick="window.dropPoint('wrong')" class="bg-stone-800 p-4 rounded-2xl text-[10px] font-bold text-red-500 border border-red-900/30">❌錯</button>
                <button onclick="window.dropPoint('danger')" class="bg-stone-800 p-4 rounded-2xl text-[10px] font-bold text-orange-400">⚠️危</button>
                <button onclick="window.dropPoint('home')" class="bg-stone-800 p-4 rounded-2xl text-[10px] font-bold border border-amber-900/30">🏠家</button>
            </div>

            <div class="bg-stone-800 p-5 rounded-[2rem] border border-stone-700 shadow-inner">
                <div class="flex justify-between mb-3 text-[10px] font-bold uppercase tracking-widest text-stone-500">
                    <span>數據量檢查</span>
                    <span id="dataSizeDisp">0 chars</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.exportQR()" class="flex-1 bg-green-700 py-4 rounded-2xl text-xs font-black shadow-lg">📤 生成 QR</button>
                    <button onclick="window.exportJSON()" class="flex-1 bg-stone-700 py-4 rounded-2xl text-xs font-black text-stone-400">📄 複製代碼</button>
                </div>
            </div>
            <button onclick="window.clearCurrentPoints()" class="w-full text-red-800 text-[10px] font-bold uppercase tracking-[0.2em]">🚨 清空目前路徑</button>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 z-[200] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/95 modal-blur" onclick="window.closeQRModal()"></div>
        <div class="bg-white p-8 rounded-[3rem] relative text-center w-full max-w-xs scale-in">
            <h3 class="text-stone-900 font-black mb-4 uppercase italic">Scan Path Data</h3>
            <div id="qrcode" class="mb-4 flex justify-center"></div>
            <p id="qrWarning" class="text-red-500 text-[9px] mb-6 font-bold leading-tight hidden">⚠️ 數據量過大，建議分段導出！</p>
            <button onclick="window.closeQRModal()" class="text-stone-900 font-black underline text-sm">確認關閉</button>
        </div>
    </div>

    <div id="importModal" class="fixed inset-0 z-[200] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/80 modal-blur" onclick="window.closeImportModal()"></div>
        <div class="bg-stone-800 p-8 rounded-[3rem] border border-stone-700 relative text-center w-full max-w-xs shadow-2xl">
            <h3 class="text-amber-500 font-black mb-1 italic">導入情報</h3>
            <p class="text-[9px] text-stone-500 mb-4 uppercase font-bold tracking-widest">只更新新座標，不覆蓋舊點位</p>
            <textarea id="importText" placeholder="在此貼上代碼..." class="w-full bg-stone-950 border border-stone-700 rounded-2xl p-4 text-[10px] text-stone-400 h-32 mb-4 outline-none font-mono"></textarea>
            <button onclick="window.processImport()" class="w-full bg-amber-600 py-4 rounded-2xl font-black shadow-xl active:scale-95">確認併入數據</button>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/80 modal-blur" onclick="window.closeAuthModal()"></div>
        <div class="bg-stone-800 w-full max-w-xs p-8 rounded-[3rem] border border-stone-700 relative text-center">
            <h3 class="text-xl font-black mb-6 text-amber-500 uppercase tracking-tighter">Leader Access</h3>
            <input id="authPass" type="password" placeholder="PASSCODE" class="w-full bg-stone-900 p-4 rounded-2xl mb-4 border border-stone-700 text-center outline-none text-2xl font-bold tracking-widest">
            <button onclick="window.verifyLeader()" class="w-full bg-amber-600 py-4 rounded-2xl font-black">驗證</button>
        </div>
    </div>

    <script>
        // --- 核心防護 ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && [85, 83, 73].includes(e.keyCode))) return false; };

        const STORAGE_KEY = 'skw_v3_8_merge';
        let missionId="", points=[], isLocked=false, userPos=null, currentAccuracy=0;
        let allMissions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

        // [SIGNS 繪圖函數與前版相同，略...]
        const s=(c,x1,y1,x2,y2)=>{c.lineCap='round';c.lineWidth=26;c.strokeStyle='#78350f';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.lineWidth=18;c.strokeStyle='#f59e0b';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();};
        const SIGNS={'go':(c)=>{s(c,300,520,300,80);s(c,300,80,220,180);s(c,300,80,380,180);},'left':(c)=>{s(c,520,300,80,300);s(c,80,300,180,220);s(c,80,300,180,380);},'right':(c)=>{s(c,80,300,520,300);s(c,520,300,420,220);s(c,520,300,420,380);},'wrong':(c)=>{s(c,150,150,450,450);s(c,450,150,150,450);},'danger':(c)=>{const st=(x,y,r)=>{c.fillStyle='#57534e';c.beginPath();for(let i=0;i<6;i++){let a=i*Math.PI/3;let dr=r*(0.8+Math.random()*0.4);c.lineTo(x+Math.cos(a)*dr,y+Math.sin(a)*dr);}c.closePath();c.fill();};st(300,200,60);st(220,380,60);st(380,380,60);},'home':(c)=>{c.lineWidth=20;c.strokeStyle='#f59e0b';c.beginPath();c.arc(300,300,180,0,Math.PI*2);c.stroke();}};

        window.joinMission = () => {
            missionId = document.getElementById('mi').value.toUpperCase().trim();
            if(!missionId) return;
            localStorage.setItem('last_id', missionId);
            const data = allMissions[missionId] || {points:[], isLocked:false};
            points=data.points; isLocked=data.isLocked;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('cid').innerText = missionId;
            updateUIState(); refresh();
        };

        window.watchGPS = () => {
            navigator.geolocation.watchPosition(p => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                currentAccuracy = p.coords.accuracy;
                document.getElementById('accuracyDisp').innerText = `ACC: ±${currentAccuracy.toFixed(1)}M`;
                document.getElementById('accuracyDisp').style.color = currentAccuracy < 10 ? '#39ff14' : '#f59e0b';
                refresh();
            }, null, { enableHighAccuracy: true });
            document.getElementById('gpsBtn').classList.replace('bg-blue-600', 'bg-green-800');
            document.getElementById('gpsBtn').innerText = "📡 監控進行中";
        };

        window.dropPoint = (t) => {
            if(isLocked) return alert("LOCKED");
            if(!userPos) return;
            if(navigator.vibrate) navigator.vibrate(80);
            document.getElementById('app').classList.add('flash-effect');
            setTimeout(()=>document.getElementById('app').classList.remove('flash-effect'),200);
            points.push({lat:userPos.lat, lng:userPos.lng, type:t, acc:currentAccuracy});
            window.saveLocal();
        };

        window.saveLocal = () => {
            allMissions[missionId] = {points, isLocked};
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allMissions));
            document.getElementById('dataSizeDisp').innerText = JSON.stringify(points).length + " chars";
            updateUIState();
        };

        // --- 核心：增量導入邏輯 ---
        window.processImport = () => {
            try {
                const data = JSON.parse(document.getElementById('importText').value);
                const mid = data.id || "IMPORT";
                const newPts = data.p || data.points || [];
                
                // 取得原本該頻道的點位（如果有的話）
                let currentPts = allMissions[mid] ? allMissions[mid].points : [];
                let addedCount = 0;

                newPts.forEach(np => {
                    // 檢查座標是否已存在（誤差 0.00001 度約為 1 公尺）
                    const exists = currentPts.some(cp => Math.abs(cp.lat - np.lat) < 1e-5 && Math.abs(cp.lng - np.lng) < 1e-5);
                    if(!exists) {
                        currentPts.push(np);
                        addedCount++;
                    }
                });

                allMissions[mid] = { points: currentPts, isLocked: true };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allMissions));
                alert(`✅ 數據併入成功！\n新增了 ${addedCount} 個新點位。`);
                location.reload();
            } catch(e) { alert("❌ 無法識別代碼"); }
        };

        // --- 強化版：分段導出 QR Code ---
window.exportQR = () => {
    if (points.length === 0) return alert("尚無點位可導出");

    // 彈出提示，詢問起始與結束站點
    const start = parseInt(prompt(`請輸入起始站點 (1 ~ ${points.length})`, "1")) - 1;
    const end = parseInt(prompt(`請輸入結束站點 (${start + 1} ~ ${points.length})`, points.length));

    if (isNaN(start) || isNaN(end) || start < 0 || end > points.length || start >= end) {
        return alert("請輸入有效的範圍！");
    }

    // 擷取指定的點位片段 (Slice)
    const selectedPoints = points.slice(start, end);
    const compactData = JSON.stringify({
        id: missionId,
        p: selectedPoints,
        range: `${start + 1}-${end}` // 記錄這是哪一段，方便辨識
    });

    // 清空並生成 QR
    const qrTarget = document.getElementById('qrcode');
    qrTarget.innerHTML = "";
    
    // 容量預警
    if (compactData.length > 1500) document.getElementById('qrWarning').classList.remove('hidden');
    else document.getElementById('qrWarning').classList.add('hidden');

    new QRCode(qrTarget, {
        text: compactData,
        width: 250,
        height: 250,
        correctLevel: QRCode.CorrectLevel.L
    });

    document.getElementById('qrModal').classList.remove('hidden');
    console.log(`已導出第 ${start + 1} 至 ${end} 站，總計 ${selectedPoints.length} 個點位。`);
};

        // [其餘 getD, refresh, updateUIState 同前，略...]
        function refresh() {
            const pIdx = parseInt(localStorage.getItem(`p_${missionId}`)||"0");
            document.getElementById('prog').innerText = `${pIdx}/${points.length}`;
            if(!userPos || points.length===0) return;
            const t = points[pIdx];
            if(!t) { document.getElementById('statusMsg').innerText="🏁 終點"; ctx.clearRect(0,0,600,600); return; }
            const dist = getD(userPos.lat, userPos.lng, t.lat, t.lng);
            document.getElementById('debugDist').innerText = `DIST: ${Math.round(dist)}M`;
            ctx.clearRect(0,0,600,600);
            if(dist <= 15) { if(SIGNS[t.type]) SIGNS[t.type](ctx); document.getElementById('statusMsg').innerText="📍 發現目標"; }
            else { document.getElementById('statusMsg').innerText="🔍 搜尋中"; }
        }
        function getD(la1,lo1,la2,lo2){const R=6371e3,f1=la1*Math.PI/180,f2=la2*Math.PI/180,df=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180,a=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
        window.updateUIState = () => {};
        window.verifyLeader = () => { if(['0728','1201'].includes(document.getElementById('authPass').value)) { document.getElementById('leader').classList.remove('hidden'); window.closeAuthModal(); } else alert("ERR"); };
        window.nextStep = () => { const p = parseInt(localStorage.getItem(`p_${missionId}`)||"0"); if(p<points.length){ localStorage.setItem(`p_${missionId}`, p+1); refresh(); } };
        window.toggleLock = () => { isLocked=!isLocked; document.getElementById('lockToggle').innerText = isLocked ? "🔓 解除" : "🔒 鎖定"; window.saveLocal(); };
        window.exitMission = () => confirm("EXIT?") && location.reload();
        window.openAuthModal = () => document.getElementById('authModal').classList.remove('hidden');
        window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');
        window.openImportModal = () => document.getElementById('importModal').classList.remove('hidden');
        window.closeImportModal = () => document.getElementById('importModal').classList.add('hidden');
        window.closeQRModal = () => document.getElementById('qrModal').classList.add('hidden');
        window.clearCurrentPoints = () => confirm("CLEAR?") && (points=[], window.saveLocal(), refresh());
        window.exportJSON = () => { navigator.clipboard.writeText(JSON.stringify({id: missionId, p: points})).then(()=>alert("JSON 已複製")); };
        window.onload = () => { if(localStorage.getItem('last_id')) document.getElementById('mi').value = localStorage.getItem('last_id'); };
    </script>
</body>
</html>
