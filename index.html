<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKW 追蹤符號系統 - 領袖佈置版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-blur { backdrop-filter: blur(8px); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .sign-card { transition: all 0.2s ease; }
        .sign-card:active { transform: scale(0.95); }
        .is-locked { opacity: 0.5; pointer-events: none; grayscale: 1; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen font-sans select-none overflow-x-hidden">

    <!-- 初始畫面 -->
    <div id="setup" class="p-10 text-center flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-4xl font-black text-amber-500 mb-2 tracking-tighter italic">SKW TRACKING</h1>
        <p class="text-stone-500 mb-12 uppercase tracking-[0.3em] text-[10px] font-bold">香港童軍總會標準號誌系統</p>
        <div class="max-w-xs w-full space-y-4">
            <input id="mi" type="text" placeholder="輸入路徑 ID" class="w-full bg-stone-800 p-5 rounded-2xl border border-stone-700 text-center uppercase font-black text-2xl outline-none focus:border-amber-500 transition-all shadow-inner">
            <button onclick="window.joinMission()" class="w-full bg-amber-600 hover:bg-amber-500 py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">進入路徑</button>
        </div>
    </div>

    <!-- 主程式介面 -->
    <div id="app" class="hidden p-4 max-w-md mx-auto pb-32">
        <!-- 頂部導航 -->
        <div class="flex justify-between items-center mb-6 bg-stone-800/90 p-4 rounded-3xl border border-stone-700 backdrop-blur-xl sticky top-4 z-40 shadow-2xl">
            <div class="pl-2">
                <span class="text-[10px] text-stone-500 block uppercase font-bold tracking-widest">Scout Channel</span>
                <h2 id="cid" class="text-xl font-black text-amber-500 tracking-widest uppercase italic">---</h2>
            </div>
            <div class="flex gap-2">
                <button id="leaderBtn" onclick="window.openAuthModal()" class="w-12 h-12 flex items-center justify-center bg-stone-700 rounded-2xl hover:bg-stone-600 active:scale-90 transition-all border border-stone-600 shadow-lg text-lg">🛠️</button>
                <button onclick="window.exitMission()" class="w-12 h-12 flex items-center justify-center bg-stone-700 rounded-2xl hover:bg-red-900/40 text-stone-400 active:scale-90 transition-all border border-stone-600 shadow-lg">✕</button>
            </div>
        </div>

        <!-- 進度與距離面板 -->
        <div class="bg-stone-800 rounded-[2rem] p-6 mb-4 text-center border border-stone-700 shadow-xl relative overflow-hidden">
            <div id="prog" class="absolute top-4 right-6 text-[10px] text-amber-500/80 font-mono font-bold bg-black/40 px-3 py-1 rounded-full">0 / 0</div>
            <div id="statusMsg" class="text-lg mb-2 italic h-12 flex items-center justify-center font-bold text-stone-300">請啟動定位以開始追蹤</div>
            <div id="debugDist" class="text-[9px] text-stone-500 font-mono tracking-[0.3em] uppercase text-center">WAITING FOR GPS...</div>
        </div>

        <!-- 符號畫布 -->
        <div class="aspect-square bg-stone-950 rounded-[3.5rem] border-8 border-stone-800 shadow-2xl flex items-center justify-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#fbbf24 1px, transparent 1px); background-size: 40px 40px;"></div>
            <canvas id="mainCanvas" width="600" height="600" class="w-full h-full p-16 relative z-10"></canvas>
            <button id="nextBtn" onclick="window.nextStep()" class="absolute bottom-8 right-8 bg-amber-500 hover:bg-amber-400 text-black px-8 py-4 rounded-full font-black text-xs shadow-2xl active:scale-90 transition-all uppercase tracking-widest border-b-4 border-amber-700">
                完成此站 ➔
            </button>
        </div>

        <!-- 定位按鈕 -->
        <button id="gpsBtn" onclick="window.watchGPS()" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-3xl font-black mt-8 shadow-xl active:scale-95 transition-all uppercase tracking-[0.4em] text-sm border-b-4 border-blue-800 flex items-center justify-center gap-3">
            <span>📡</span> 啟動追蹤儀器
        </button>

        <!-- 領袖管理介面 -->
        <div id="leader" class="mt-12 space-y-8 hidden animate-in fade-in slide-in-from-bottom-8 duration-500 pb-20">
            <div class="h-px bg-stone-700 w-full"></div>
            <div class="flex justify-between items-center">
                <h3 class="text-amber-500 font-black uppercase tracking-[0.2em] text-sm flex items-center gap-3">
                    <span class="w-3 h-3 bg-amber-500 rounded-full animate-pulse shadow-[0_0_10px_#f59e0b]"></span>
                    領袖佈置面板
                </h3>
                <button id="lockToggle" onclick="window.toggleLock()" class="text-[10px] bg-stone-800 px-4 py-2 rounded-full border border-stone-600 font-bold uppercase tracking-widest">鎖定路徑</button>
            </div>

            <!-- 號誌選擇器 -->
            <div id="editorControls" class="grid grid-cols-3 gap-3">
                <button onclick="window.dropPoint('go')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⬆️ 向前走</button>
                <button onclick="window.dropPoint('left')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⬅️ 向左轉</button>
                <button onclick="window.dropPoint('right')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">➡️ 向右轉</button>
                <button onclick="window.dropPoint('wrong')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">❌ 此路不通</button>
                <button onclick="window.dropPoint('danger')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⚠️ 有危險</button>
                <button onclick="window.dropPoint('split')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">🔱 分頭搜尋</button>
                <button onclick="window.dropPoint('wait')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⏸ 在此等待</button>
                <button onclick="window.dropPoint('home')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">🏠 我已回中心</button>
                <button onclick="window.dropPoint('block')" class="sign-card bg-stone-800 border border-stone-700 p-4 rounded-2xl text-[10px] font-bold">⛰️ 前方障礙</button>
                <button onclick="window.openStepModal()" class="sign-card bg-amber-900/20 border border-amber-600/30 p-4 rounded-2xl text-[10px] font-bold col-span-3">👣 X 步後有信物</button>
            </div>

            <!-- 路徑管理列表 -->
            <div class="bg-stone-800/50 rounded-3xl p-6 border border-stone-700">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="text-stone-400 font-bold text-xs uppercase tracking-widest">路徑站點明細 (點擊預覽)</h4>
                    <span id="totalPoints" class="text-amber-500 font-mono text-xs font-bold">Total: 0</span>
                </div>
                <div id="pointList" class="space-y-2 max-h-80 overflow-y-auto pr-2">
                    <!-- 列表 -->
                </div>
                
                <button onclick="window.finishSetup()" class="w-full bg-green-700 hover:bg-green-600 py-4 rounded-2xl font-black mt-6 shadow-xl text-xs uppercase tracking-[0.2em]">✨ 佈置完成並發布路線</button>
            </div>
        </div>

        <button onclick="window.resetProg()" class="w-full text-[10px] text-stone-600 font-bold mt-10 uppercase tracking-[0.3em] hover:text-red-500 py-2">重置個人追蹤進度</button>
    </div>

    <!-- 驗證彈窗 -->
    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/80 modal-blur" onclick="window.closeAuthModal()"></div>
        <div class="bg-stone-800 w-full max-w-xs p-8 rounded-[3rem] border border-stone-700 animate-slide-up">
            <h3 class="text-xl font-black text-center mb-6 text-amber-500">領袖權限驗證</h3>
            <input id="authPass" type="password" placeholder="輸入密碼" class="w-full bg-stone-900 p-4 rounded-2xl mb-4 border border-stone-700 text-center outline-none focus:border-amber-500 text-2xl font-bold tracking-widest">
            <div class="flex gap-3">
                <button onclick="window.closeAuthModal()" class="flex-1 bg-stone-700 py-4 rounded-2xl font-bold text-sm">取消</button>
                <button onclick="window.verifyLeader()" class="flex-1 bg-amber-600 py-4 rounded-2xl font-bold text-sm">確認</button>
            </div>
        </div>
    </div>

    <!-- 步數設定彈窗 -->
    <div id="stepModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/80 modal-blur" onclick="window.closeStepModal()"></div>
        <div class="bg-stone-800 w-full max-w-xs p-8 rounded-[3rem] border border-stone-700 animate-slide-up">
            <h3 class="text-xl font-black text-center mb-2 text-amber-500">信物步數設定</h3>
            <input id="stepCount" type="number" value="20" class="w-full bg-stone-900 p-4 rounded-2xl mb-6 border border-stone-700 text-center text-4xl font-black outline-none focus:border-amber-500">
            <div class="flex gap-3">
                <button onclick="window.closeStepModal()" class="flex-1 bg-stone-700 py-4 rounded-2xl font-bold text-sm">取消</button>
                <button onclick="window.submitSteps()" class="flex-1 bg-amber-600 py-4 rounded-2xl font-bold text-sm">完成</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        let db, auth, appId, unsubscribe = null, isLocked = false;
        let points = [], userPos = null, currentUser = null, missionId = localStorage.getItem('active_mission_id') || "";
        const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

        // --- 核心邏輯 ---
        window.joinMission = () => {
            const val = document.getElementById('mi').value.toUpperCase().trim();
            if(!val) return; missionId = val;
            localStorage.setItem('active_mission_id', missionId);
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('cid').innerText = missionId;
            if (currentUser) startListening();
        };

        window.dropPoint = async (type, val = null) => {
            if (isLocked) return alert("路徑已鎖定，請先解除鎖定再編輯。");
            if (!userPos) return alert("等待 GPS...");
            points.push({ lat: userPos.lat, lng: userPos.lng, type, val, timestamp: Date.now() });
            await savePointsToCloud();
        };

        window.finishSetup = () => {
            if (points.length === 0) return alert("尚未新增任何站點！");
            window.toggleLock(true);
            alert(`🎉 發布成功！\n路徑 ID: ${missionId}\n總站數: ${points.length}\n小隊員現在可以開始追蹤了。`);
        };

        window.toggleLock = (force) => {
            isLocked = typeof force === 'boolean' ? force : !isLocked;
            document.getElementById('editorControls').classList.toggle('is-locked', isLocked);
            document.getElementById('lockToggle').innerText = isLocked ? "🔓 解除鎖定" : "🔒 鎖定路徑";
            document.getElementById('lockToggle').classList.toggle('bg-red-900/40', isLocked);
        };

        window.previewPoint = (index) => {
            const p = points[index];
            ctx.clearRect(0,0,600,600);
            if(SIGNS[p.type]) SIGNS[p.type](ctx, p.val);
            document.getElementById('statusMsg').innerText = `預覽第 ${index+1} 站號誌`;
        };

        // --- Firebase 操作 ---
        const savePointsToCloud = async () => {
            if (!db || !missionId) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'missions', missionId), { points, isLocked, lastUpdated: Date.now() });
        };

        function startListening() {
            if(unsubscribe) unsubscribe();
            unsubscribe = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'missions', missionId), snap => {
                if(snap.exists()){ 
                    const data = snap.data();
                    points = data.points || [];
                    isLocked = data.isLocked || false;
                    updateUIState();
                    refresh();
                }
            });
        }

        function updateUIState() {
            document.getElementById('totalPoints').innerText = `Total: ${points.length}`;
            document.getElementById('pointList').innerHTML = points.map((p, i) => `
                <div onclick="window.previewPoint(${i})" class="flex items-center justify-between bg-stone-900 p-3 rounded-xl border border-stone-700/50 cursor-pointer hover:bg-stone-800 transition-colors">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] text-amber-500 font-mono font-bold">站點 ${i+1}</span>
                        <span class="text-xs font-bold text-stone-200 uppercase">${p.type === 'steps' ? p.val+'步後有信物' : getTypeName(p.type)}</span>
                    </div>
                    <div class="flex gap-1" onclick="event.stopPropagation()">
                        <button onclick="window.movePoint(${i}, -1)" class="w-8 h-8 bg-stone-800 rounded-lg text-[10px]">▲</button>
                        <button onclick="window.movePoint(${i}, 1)" class="w-8 h-8 bg-stone-800 rounded-lg text-[10px]">▼</button>
                        <button onclick="window.deletePoint(${i})" class="w-8 h-8 bg-red-900/20 text-red-500 rounded-lg text-[10px]">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function getTypeName(type) {
            const names = { 'go':'向前走', 'left':'向左轉', 'right':'向右轉', 'wrong':'不通', 'danger':'危險', 'split':'分頭', 'wait':'等待', 'home':'中心', 'block':'障礙' };
            return names[type] || type;
        }

        // --- 繪圖與導航邏輯 (其餘保持原樣) ---
        const s=(c,x1,y1,x2,y2)=>{c.lineCap='round';c.lineWidth=26;c.strokeStyle='#78350f';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.lineWidth=18;c.strokeStyle='#f59e0b';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();};
        const SIGNS={'go':(c)=>{s(c,300,520,300,80);s(c,300,80,220,180);s(c,300,80,380,180);},'left':(c)=>{s(c,520,300,80,300);s(c,80,300,180,220);s(c,80,300,180,380);},'right':(c)=>{s(c,80,300,520,300);s(c,520,300,420,220);s(c,520,300,420,380);},'wrong':(c)=>{s(c,150,150,450,450);s(c,450,150,150,450);},'danger':(c)=>{const st=(x,y,r)=>{c.fillStyle='#57534e';c.beginPath();for(let i=0;i<6;i++){let a=i*Math.PI/3;let dr=r*(0.8+Math.random()*0.4);c.lineTo(x+Math.cos(a)*dr,y+Math.sin(a)*dr);}c.closePath();c.fill();};st(300,200,60);st(220,380,60);st(380,380,60);},'split':(c)=>{s(c,300,520,300,300);s(c,300,300,150,150);s(c,300,300,450,150);},'wait':(c)=>{s(c,150,200,450,200);s(c,150,300,450,300);s(c,150,400,450,400);},'home':(c)=>{c.lineWidth=20;c.strokeStyle='#f59e0b';c.beginPath();c.arc(300,300,180,0,Math.PI*2);c.stroke();c.fillStyle='#f59e0b';c.beginPath();c.arc(300,300,30,0,Math.PI*2);c.fill();},'block':(c)=>{s(c,100,450,300,150);s(c,300,150,500,450);},'steps':(c,v)=>{c.lineWidth=15;c.strokeStyle='#f59e0b';c.beginPath();c.arc(300,300,150,0,Math.PI*2);c.stroke();c.fillStyle='#f59e0b';c.font="900 120px sans-serif";c.textAlign="center";c.fillText(v||"0",300,345);s(c,300,140,300,40);}};

        function refresh() {
            const pIndex = parseInt(localStorage.getItem(`p_${missionId}`) || "0");
            document.getElementById('prog').innerText = `${pIndex} / ${points.length}`;
            if (!userPos || points.length === 0) return;
            const target = points[pIndex];
            if (!target) { document.getElementById('statusMsg').innerText = "🏁 抵達終點！"; ctx.clearRect(0,0,600,600); return; }
            const dist = getD(userPos.lat, userPos.lng, target.lat, target.lng);
            document.getElementById('debugDist').innerText = `距離標記點: ${Math.round(dist)}M`;
            if (dist <= 15) {
                ctx.clearRect(0,0,600,600);
                if(SIGNS[target.type]) SIGNS[target.type](ctx, target.val);
                document.getElementById('statusMsg').innerText = "📍 找到號誌了！";
                document.getElementById('statusMsg').className = "text-amber-500 font-black animate-pulse";
            } else {
                ctx.clearRect(0,0,600,600);
                document.getElementById('statusMsg').innerText = dist < 40 ? "🔥 訊號強烈" : "🔍 搜尋路徑中...";
                document.getElementById('statusMsg').className = "text-stone-400 font-bold";
            }
        }

        function getD(la1,lo1,la2,lo2){const R=6371e3,f1=la1*Math.PI/180,f2=la2*Math.PI/180,df=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180,a=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

        window.openAuthModal = () => document.getElementById('authModal').classList.remove('hidden');
        window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');
        window.verifyLeader = () => { if(document.getElementById('authPass').value==="1234"){ document.getElementById('leader').classList.remove('hidden'); window.closeAuthModal(); } else alert("密碼錯誤"); };
        window.openStepModal = () => document.getElementById('stepModal').classList.remove('hidden');
        window.closeStepModal = () => document.getElementById('stepModal').classList.add('hidden');
        window.submitSteps = () => { window.dropPoint('steps', document.getElementById('stepCount').value); window.closeStepModal(); };
        window.watchGPS = () => { navigator.geolocation.watchPosition(p=>{userPos={lat:p.coords.latitude,lng:p.coords.longitude};refresh();}); document.getElementById('gpsBtn').innerText="📡 定位運作中"; };
        window.nextStep = () => { const p = parseInt(localStorage.getItem(`p_${missionId}`)||"0"); if(p<points.length){ localStorage.setItem(`p_${missionId}`, p+1); refresh(); } };
        window.resetProg = () => { if(confirm("重置進度？")){ localStorage.setItem(`p_${missionId}`,0); location.reload(); } };
        window.movePoint = async (i, d) => { const n=i+d; if(n>=0&&n<points.length){ [points[i],points[n]]=[points[n],points[i]]; await savePointsToCloud(); } };
        window.deletePoint = async (i) => { if(confirm("刪除？")){ points.splice(i,1); await savePointsToCloud(); } };
        window.exitMission = () => { if(confirm("離開？")){ localStorage.removeItem('active_mission_id'); location.reload(); } };

        // 初始化 Firebase
        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app); db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'skw-v2';
            onAuthStateChanged(auth, u => { currentUser = u; if(u && missionId) startListening(); });
            const initAuth = async () => { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); else await signInAnonymously(auth); };
            initAuth();
        } catch (e) { console.error(e); }
        window.onload = () => { if(missionId) window.joinMission(); };
    </script>
</body>
</html>
